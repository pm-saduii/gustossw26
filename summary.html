<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>สรุปค่าส่วนกลาง — ระบบบริหารหมู่บ้าน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root{--primary:#5b8dee;--primary-d:#3a6fd8;--accent:#7ec8a4;--bg:#eef3fb;--card:#fff;--text:#2d3748;--muted:#718096;--border:#d6e4f7;--paid:#d1fae5;--paid-c:#059669;--partial:#fef3c7;--partial-c:#d97706;--unpaid:#fee2e2;--unpaid-c:#dc2626;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    nav{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;padding:.85rem 1.5rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(91,141,238,.3);position:sticky;top:0;z-index:100;}
    .nav-brand{display:flex;align-items:center;gap:.6rem;font-size:1.05rem;font-weight:700;}
    .btn-nav{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);color:#fff;padding:.35rem .8rem;border-radius:8px;font-family:'Sarabun',sans-serif;font-size:.82rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;}
    .btn-nav:hover{background:rgba(255,255,255,.3);}
    .page-links{background:#fff;border-bottom:1px solid var(--border);padding:.5rem 1.5rem;display:flex;gap:.5rem;overflow-x:auto;}
    .page-link{white-space:nowrap;padding:.4rem .9rem;border-radius:20px;font-size:.82rem;font-weight:500;text-decoration:none;color:var(--muted);border:1.5px solid transparent;transition:all .15s;}
    .page-link:hover,.page-link.active{background:var(--bg);border-color:var(--border);color:var(--primary);}
    main{max-width:960px;margin:0 auto;padding:1.5rem 1rem;}
    .toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.5rem;}
    .toolbar h2{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:.5rem;}
    .toolbar h2 i{color:var(--primary);}
    .year-select{display:flex;gap:.4rem;flex-wrap:wrap;}
    .year-btn{padding:.38rem .9rem;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:'Sarabun',sans-serif;font-size:.85rem;color:var(--muted);cursor:pointer;transition:all .15s;}
    .year-btn.active,.year-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
    .top-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:1rem;margin-bottom:1.5rem;}
    .stat-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:1.1rem 1.25rem;box-shadow:0 2px 10px rgba(0,0,0,.04);}
    .stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:.6rem;}
    .stat-label{font-size:.78rem;color:var(--muted);margin-bottom:.15rem;}
    .stat-value{font-size:1.45rem;font-weight:700;line-height:1.2;}
    .stat-sub{font-size:.75rem;color:var(--muted);margin-top:.1rem;}
    .section-title{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;}
    .section-title i{color:var(--primary);}
    .half-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
    .half-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:1rem 1.25rem;box-shadow:0 2px 8px rgba(0,0,0,.04);}
    .half-card-title{font-size:.85rem;font-weight:700;color:var(--primary);margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem;}
    .half-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.45rem;}
    .half-lbl{font-size:.83rem;color:var(--muted);}
    .half-val{font-size:1rem;font-weight:700;}
    .progress-wrap{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:1.1rem 1.25rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.04);}
    .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.75rem;}
    .progress-title{font-size:.9rem;font-weight:700;display:flex;align-items:center;gap:.4rem;}
    .progress-title i{color:var(--primary);}
    .progress-pct{font-size:1.5rem;font-weight:800;color:var(--primary);}
    .progress-bar{height:16px;background:#e2ecf8;border-radius:20px;overflow:hidden;margin-bottom:.5rem;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--primary));border-radius:20px;transition:width 1s ease;width:0%;}
    .progress-detail{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);}
    .soi-card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.04);}
    .soi-header{padding:.9rem 1.25rem;background:linear-gradient(90deg,#f0f7ff,#f0faf5);border-bottom:1px solid var(--border);font-weight:700;display:flex;align-items:center;gap:.5rem;}
    .soi-header i{color:var(--primary);}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    th{text-align:left;padding:.65rem 1rem;font-size:.78rem;font-weight:700;color:var(--muted);border-bottom:1px solid var(--border);background:#fafcff;white-space:nowrap;}
    td{padding:.7rem 1rem;font-size:.88rem;border-bottom:1px solid var(--border);}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:#f8fbff;}
    .badge{font-size:.75rem;padding:.18rem .65rem;border-radius:12px;font-weight:700;display:inline-block;}
    .badge.paid{background:var(--paid);color:var(--paid-c);}
    .badge.partial{background:var(--partial);color:var(--partial-c);}
    .badge.unpaid{background:var(--unpaid);color:var(--unpaid-c);}
    .bar-mini{height:7px;background:#e2ecf8;border-radius:10px;min-width:70px;overflow:hidden;}
    .bar-mini-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--primary));border-radius:10px;}
    .skeleton{background:linear-gradient(90deg,#e2ecf8 25%,#f0f6ff 50%,#e2ecf8 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;min-height:80px;}
    @keyframes shimmer{to{background-position:-200% 0;}}
    @media(max-width:600px){.half-grid{grid-template-columns:1fr;}.top-grid{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>
<nav>
  <div class="nav-brand"><i class="fa-solid fa-chart-pie"></i> สรุปค่าส่วนกลาง</div>
  <a href="index.html" class="btn-nav" id="homeLink"><i class="fa-solid fa-house"></i> หน้าหลัก</a>
</nav>
<div class="page-links">
  <a href="dashboard.html" class="page-link" id="dashLink"><i class="fa-solid fa-house"></i> ข้อมูลของฉัน</a>
  <a href="summary.html" class="page-link active"><i class="fa-solid fa-chart-pie"></i> สรุปค่าส่วนกลาง</a>
  <a href="announcements.html" class="page-link"><i class="fa-solid fa-bullhorn"></i> ประกาศ</a>
  <a href="niti-report.html" class="page-link"><i class="fa-solid fa-clipboard-list"></i> ผลงานนิติ</a>
</div>
<main>
  <div class="toolbar">
    <h2><i class="fa-solid fa-chart-bar"></i> สรุปการจ่ายค่าส่วนกลาง</h2>
    <div class="year-select" id="yearBtns"><span style="font-size:.82rem;color:var(--muted)">กำลังโหลด...</span></div>
  </div>
  <div class="top-grid" id="topGrid">
    <div class="stat-card"><div class="skeleton"></div></div>
    <div class="stat-card"><div class="skeleton"></div></div>
    <div class="stat-card"><div class="skeleton"></div></div>
    <div class="stat-card"><div class="skeleton"></div></div>
  </div>
  <div class="section-title"><i class="fa-solid fa-calendar-days"></i> ชำระแยกตามครึ่งปี (จำนวนหลัง)</div>
  <div class="half-grid" id="halfGrid">
    <div class="half-card"><div class="skeleton"></div></div>
    <div class="half-card"><div class="skeleton"></div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-top">
      <div class="progress-title"><i class="fa-solid fa-percent"></i> อัตราการชำระค่าส่วนกลางรวม (คิดจากยอดเงิน)</div>
      <div class="progress-pct" id="progressPct">—%</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-detail">
      <span>ชำระแล้ว <strong id="amtPaid">—</strong> บาท</span>
      <span>ยอดรวมที่ต้องชำระ <strong id="amtDue">—</strong> บาท</span>
    </div>
  </div>
  <div class="soi-card" id="soiCard">
    <div class="soi-header"><i class="fa-solid fa-road"></i> รายละเอียดแยกตามซอย</div>
    <div class="skeleton" style="margin:1rem"></div>
  </div>
</main>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbwQbc31pY86tM7EdD41dBsXRQ-OmL6M5m0TJKs_ZJiix2bLEYkHOiQ8eIGazR7ay0_l/exec';
const token=localStorage.getItem('vms_token');
const role=localStorage.getItem('vms_role');
if(!token) document.getElementById('dashLink').style.display='none';
if(role==='admin'){document.getElementById('homeLink').href='admin.html';document.getElementById('homeLink').innerHTML='<i class="fa-solid fa-shield-halved"></i> Admin';}

let currentYear='';

async function api(p){const r=await fetch(API_URL+'?'+new URLSearchParams(p).toString());return r.json();}
function fmt(n){return Number(n||0).toLocaleString('th-TH');}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function barHtml(p){return `<div class="bar-mini"><div class="bar-mini-fill" style="width:${p}%"></div></div>`;}

async function init(){
  const d=await api({action:'getFeeSummary'});
  if(!d.success)return;
  const years=d.data.years||[];
  // ใช้ปีล่าสุดที่มีข้อมูลจริงเสมอ
  currentYear = years.length > 0 ? years[0] : '';
  // สร้างปุ่มปีจากข้อมูลจริงใน Sheet
  document.getElementById('yearBtns').innerHTML=years.length
    ? years.map(y=>`<button class="year-btn ${y===currentYear?'active':''}" onclick="selectYear(this,'${y}')">${y}</button>`).join('')
    : '<span style="font-size:.82rem;color:var(--muted)">ไม่มีข้อมูล</span>';
  // โหลดข้อมูลของปีล่าสุด
  if(currentYear && currentYear !== d.data.year) {
    const d2 = await api({action:'getFeeSummary', year:currentYear});
    if(d2.success) renderSummary(d2.data);
  } else {
    renderSummary(d.data);
  }
}

async function selectYear(btn,year){
  document.querySelectorAll('.year-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentYear=year;
  setLoading();
  const d=await api({action:'getFeeSummary',year});
  if(d.success)renderSummary(d.data);
}

function renderSummary(d){
  const{year,totalHouses,h1Paid,h1Unpaid,h2Paid,h2Unpaid,hFullPaid,hPartial,hUnpaid,amtDue,amtPaid,paidPct,housePaidPct,bySoi}=d;

  // ── stat cards ──────────────────────────────────────
  document.getElementById('topGrid').innerHTML=`
    <div class="stat-card">
      <div class="stat-icon" style="background:#dbeafe;color:var(--primary)"><i class="fa-solid fa-house"></i></div>
      <div class="stat-label">บ้านทั้งหมด</div>
      <div class="stat-value">${totalHouses}</div>
      <div class="stat-sub">หลัง</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--paid);color:var(--paid-c)"><i class="fa-solid fa-circle-check"></i></div>
      <div class="stat-label">ชำระครบทั้งปี</div>
      <div class="stat-value" style="color:var(--paid-c)">${hFullPaid}</div>
      <div class="stat-sub">หลัง &nbsp;·&nbsp; ${housePaidPct}% ของทั้งหมด</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--partial);color:var(--partial-c)"><i class="fa-solid fa-circle-half-stroke"></i></div>
      <div class="stat-label">ชำระบางส่วน</div>
      <div class="stat-value" style="color:var(--partial-c)">${hPartial}</div>
      <div class="stat-sub">หลัง</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--unpaid);color:var(--unpaid-c)"><i class="fa-solid fa-circle-xmark"></i></div>
      <div class="stat-label">ยังไม่ชำระ</div>
      <div class="stat-value" style="color:var(--unpaid-c)">${hUnpaid}</div>
      <div class="stat-sub">หลัง</div>
    </div>`;

  // ── half-year ───────────────────────────────────────
  const h1pct=pct(h1Paid,totalHouses), h2pct=pct(h2Paid,totalHouses);
  document.getElementById('halfGrid').innerHTML=`
    <div class="half-card">
      <div class="half-card-title"><i class="fa-solid fa-calendar-days"></i> ครึ่งปีแรก (ม.ค.–มิ.ย.) ปี ${year}</div>
      <div class="half-row">
        <span class="half-lbl"><i class="fa-solid fa-circle-check" style="color:var(--paid-c)"></i> ชำระครบแล้ว</span>
        <span class="half-val" style="color:var(--paid-c)">${h1Paid} หลัง</span>
      </div>
      <div class="half-row">
        <span class="half-lbl"><i class="fa-solid fa-circle-xmark" style="color:var(--unpaid-c)"></i> ยังไม่ชำระ</span>
        <span class="half-val" style="color:var(--unpaid-c)">${h1Unpaid} หลัง</span>
      </div>
      <div style="margin-top:.6rem">
        <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:.3rem">
          <span>อัตราชำระ (จำนวนหลัง)</span><span style="font-weight:700;color:var(--primary)">${h1pct}%</span>
        </div>
        ${barHtml(h1pct)}
      </div>
    </div>
    <div class="half-card">
      <div class="half-card-title"><i class="fa-solid fa-calendar-days"></i> ครึ่งปีหลัง (ก.ค.–ธ.ค.) ปี ${year}</div>
      <div class="half-row">
        <span class="half-lbl"><i class="fa-solid fa-circle-check" style="color:var(--paid-c)"></i> ชำระครบแล้ว</span>
        <span class="half-val" style="color:var(--paid-c)">${h2Paid} หลัง</span>
      </div>
      <div class="half-row">
        <span class="half-lbl"><i class="fa-solid fa-circle-xmark" style="color:var(--unpaid-c)"></i> ยังไม่ชำระ</span>
        <span class="half-val" style="color:var(--unpaid-c)">${h2Unpaid} หลัง</span>
      </div>
      <div style="margin-top:.6rem">
        <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:.3rem">
          <span>อัตราชำระ (จำนวนหลัง)</span><span style="font-weight:700;color:var(--primary)">${h2pct}%</span>
        </div>
        ${barHtml(h2pct)}
      </div>
    </div>`;

  // ── progress (จากยอดเงิน) ──────────────────────────
  document.getElementById('progressPct').textContent=paidPct+'%';
  document.getElementById('amtPaid').textContent=fmt(amtPaid);
  document.getElementById('amtDue').textContent=fmt(amtDue);
  setTimeout(()=>{document.getElementById('progressFill').style.width=paidPct+'%';},100);

  // ── soi table ──────────────────────────────────────
  const entries=Object.entries(bySoi||{}).sort((a,b)=>a[0].localeCompare(b[0],'th'));
  const rows=entries.map(([soi,s])=>{
    const sp=pct(s.fullPaid,s.total);
    const sap=pct(s.amtPaid,s.amtDue);
    return `<tr>
      <td><strong>${soi}</strong></td>
      <td style="text-align:center">${s.total} หลัง</td>
      <td style="text-align:center"><span class="badge paid">${s.fullPaid} หลัง</span></td>
      <td style="text-align:center"><span class="badge partial">${s.partial} หลัง</span></td>
      <td style="text-align:center"><span class="badge unpaid">${s.unpaid} หลัง</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:.5rem">${barHtml(sp)}<span style="font-size:.8rem;font-weight:700;color:var(--primary)">${sp}%</span></div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:.15rem">ยอดเงิน ${sap}% &nbsp;(${fmt(s.amtPaid)}/${fmt(s.amtDue)} บาท)</div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('soiCard').innerHTML=`
    <div class="soi-header"><i class="fa-solid fa-road"></i> รายละเอียดแยกตามซอย — ปี พ.ศ. ${year}</div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>ซอย</th><th style="text-align:center">ทั้งหมด</th>
        <th style="text-align:center">ชำระครบ</th><th style="text-align:center">บางส่วน</th>
        <th style="text-align:center">ค้างชำระ</th><th>% ชำระ (หลัง / เงิน)</th>
      </tr></thead>
      <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem">ไม่มีข้อมูลในปีนี้</td></tr>'}</tbody>
    </table></div>`;
}

function setLoading(){
  document.getElementById('topGrid').innerHTML=Array(4).fill('<div class="stat-card"><div class="skeleton"></div></div>').join('');
  document.getElementById('halfGrid').innerHTML='<div class="half-card"><div class="skeleton"></div></div><div class="half-card"><div class="skeleton"></div></div>';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('progressPct').textContent='—%';
  document.getElementById('amtPaid').textContent='—';
  document.getElementById('amtDue').textContent='—';
  document.getElementById('soiCard').innerHTML='<div class="soi-header"><i class="fa-solid fa-road"></i> รายละเอียดแยกตามซอย</div><div class="skeleton" style="margin:1rem"></div>';
}

init();
</script>
</body>
</html>
