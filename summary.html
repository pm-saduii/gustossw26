<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏘️</text></svg>"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>สรุปค่าส่วนกลาง — ระบบบริหารหมู่บ้าน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root{--primary:#4f7ef7;--primary-d:#2f5be8;--primary-l:#e8efff;--accent:#34c88a;--accent-d:#1ea870;--bg:#f0f4fd;--bg2:#e4ecfb;--card:#fff;--card2:#f8faff;--text:#1a2035;--text2:#4a5568;--muted:#8896ab;--border:#d0ddf5;--shadow:rgba(79,126,247,.15);--shadow2:rgba(0,0,0,.06);--paid:#d1fae5;--paid-c:#059669;--partial:#fef3c7;--partial-c:#d97706;--unpaid:#fee2e2;--unpaid-c:#dc2626;}
    [data-theme="dark"]{--primary:#6b9aff;--primary-d:#4f7ef7;--primary-l:#1a2540;--accent:#3dd68c;--bg:#0f1420;--bg2:#151c2e;--card:#1a2235;--card2:#202840;--text:#e8eeff;--text2:#a0aec0;--muted:#5a6a85;--border:#2a3650;--shadow:rgba(107,154,255,.12);--shadow2:rgba(0,0,0,.3);--paid:#0d2a1e;--paid-c:#34d399;--partial:#2a2010;--partial-c:#fbbf24;--unpaid:#2a1010;--unpaid-c:#f87171;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
    /* ── NAV ── */
    nav{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;padding:.8rem 1.25rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px var(--shadow);position:sticky;top:0;z-index:200;}
    .nav-brand{display:flex;align-items:center;gap:.6rem;font-size:1rem;font-weight:700;}
    .nav-right{display:flex;align-items:center;gap:.5rem;}
    .btn-nav{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;padding:.35rem .8rem;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:.8rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;transition:background .15s;}
    .btn-nav:hover{background:rgba(255,255,255,.28);}
    .btn-theme{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;transition:background .15s;}
    .btn-theme:hover{background:rgba(255,255,255,.28);}

    /* ── PAGE TABS — desktop: horizontal pill bar ── */
    .page-tabs{
      background:var(--card);
      border-bottom:1px solid var(--border);
      padding:0 1rem;
      display:flex;
      gap:0;
      transition:background .3s,border-color .3s;
      position:sticky;
      top:54px;
      z-index:100;
    }
    .page-tab{
      white-space:nowrap;
      padding:.72rem 1.1rem;
      font-size:.84rem;
      font-weight:600;
      text-decoration:none;
      color:var(--muted);
      border-bottom:2.5px solid transparent;
      display:flex;
      align-items:center;
      gap:.4rem;
      transition:color .15s,border-color .15s;
      flex-shrink:0;
    }
    .page-tab i{font-size:.82rem;}
    .page-tab:hover{color:var(--primary);}
    .page-tab.active{color:var(--primary);border-bottom-color:var(--primary);}

    /* ── PAGE TABS — mobile: bottom navigation bar ── */
    @media(max-width:600px){
      body{padding-bottom:68px;}  /* space for bottom bar */
      main{padding-bottom:.5rem;}

      .page-tabs{
        position:fixed;
        bottom:0; left:0; right:0;
        top:auto;
        padding:0;
        border-bottom:none;
        border-top:1px solid var(--border);
        background:var(--card);
        box-shadow:0 -4px 20px rgba(0,0,0,.08);
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:0;
        z-index:300;
        backdrop-filter:blur(12px);
        -webkit-backdrop-filter:blur(12px);
      }
      .page-tab{
        flex-direction:column;
        align-items:center;
        justify-content:center;
        padding:.6rem .3rem .55rem;
        gap:.18rem;
        border-bottom:none;
        border-top:3px solid transparent;
        font-size:.65rem;
        color:var(--muted);
        transition:color .15s,border-color .15s,background .15s;
      }
      .page-tab i{font-size:1.05rem;}
      .page-tab span{font-size:.67rem;font-weight:600;line-height:1;}
      .page-tab:hover{background:var(--bg2);color:var(--primary);}
      .page-tab.active{
        color:var(--primary);
        border-top-color:var(--primary);
        background:var(--primary-l);
      }
      .btn-nav-text{display:none;}
    }
    main{max-width:980px;margin:0 auto;padding:1.5rem 1rem;}
    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.5rem;animation:fadeSlideIn .4s ease both;}
    .toolbar h2{font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:.5rem;}
    .toolbar h2 i{color:var(--primary);}
    .year-select{display:flex;gap:.4rem;flex-wrap:wrap;}
    .year-btn{padding:.38rem .9rem;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-family:'Sarabun',sans-serif;font-size:.85rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;}
    .year-btn.active,.year-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}

    /* STAT CARDS */
    .top-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:1rem;margin-bottom:1.5rem;}
    .stat-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:1.1rem 1.2rem;box-shadow:0 2px 12px var(--shadow2);transition:transform .2s,box-shadow .2s,background .3s;animation:fadeSlideIn .4s ease both;}
    .stat-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px var(--shadow);}
    .stat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:.6rem;}
    .stat-label{font-size:.77rem;color:var(--muted);margin-bottom:.15rem;font-weight:600;}
    .stat-value{font-size:1.5rem;font-weight:800;line-height:1.2;}
    .stat-sub{font-size:.74rem;color:var(--muted);margin-top:.1rem;}

    /* CHART SECTION */
    .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
    .chart-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:1.2rem;box-shadow:0 2px 12px var(--shadow2);animation:fadeSlideIn .4s .1s ease both;transition:background .3s,border-color .3s;}
    .chart-title{font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:.4rem;}
    .chart-title i{color:var(--primary);}
    .chart-wrap{position:relative;height:200px;}

    /* HALF YEAR */
    .section-title{font-size:.92rem;font-weight:700;display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;color:var(--text);}
    .section-title i{color:var(--primary);}
    .half-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
    .half-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:1rem 1.2rem;box-shadow:0 2px 10px var(--shadow2);transition:background .3s;}
    .half-card-title{font-size:.85rem;font-weight:700;color:var(--primary);margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem;}
    .half-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.45rem;}
    .half-lbl{font-size:.82rem;color:var(--muted);}
    .half-val{font-size:.95rem;font-weight:700;}

    /* PROGRESS */
    .progress-wrap{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:1.2rem;margin-bottom:1.5rem;box-shadow:0 2px 10px var(--shadow2);animation:fadeSlideIn .4s .15s ease both;transition:background .3s;}
    .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.75rem;}
    .progress-title{font-size:.9rem;font-weight:700;display:flex;align-items:center;gap:.4rem;}
    .progress-title i{color:var(--primary);}
    .progress-pct{font-size:1.6rem;font-weight:800;color:var(--primary);}
    .progress-bar{height:18px;background:var(--bg2);border-radius:20px;overflow:hidden;margin-bottom:.5rem;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--primary));border-radius:20px;transition:width 1.2s cubic-bezier(.34,1,.64,1);width:0%;}
    .progress-detail{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);}

    /* SOI TABLE */
    .soi-card{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 12px var(--shadow2);animation:fadeSlideIn .4s .2s ease both;transition:background .3s;}
    .soi-header{padding:.9rem 1.2rem;background:var(--card2);border-bottom:1px solid var(--border);font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;transition:background .3s;}
    .soi-header-left{display:flex;align-items:center;gap:.5rem;font-size:.92rem;}
    .soi-header-left i{color:var(--primary);}
    .soi-header-right{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
    .soi-filter{padding:.32rem .75rem;border:1.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-family:'Sarabun',sans-serif;font-size:.82rem;cursor:pointer;transition:border-color .15s;}
    .soi-filter:focus{outline:none;border-color:var(--primary);}

    /* ── Desktop: table ── */
    .soi-table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    th{text-align:center;padding:.55rem .6rem;font-size:.76rem;font-weight:700;color:var(--muted);border-bottom:1px solid var(--border);background:var(--card2);white-space:nowrap;}
    th.th-left{text-align:left;}
    th.th-group{background:var(--primary-l);color:var(--primary);font-size:.75rem;border-left:2px solid var(--primary);border-bottom:2px solid var(--primary);}
    th.th-group-r{background:#fdf4ff;color:#7c3aed;font-size:.75rem;border-left:2px solid #c4b5fd;border-bottom:2px solid #c4b5fd;}
    [data-theme="dark"] th.th-group-r{background:#1e1230;color:#a78bfa;border-left-color:#4c1d95;border-bottom-color:#4c1d95;}
    td{padding:.65rem .7rem;font-size:.85rem;border-bottom:1px solid var(--border);transition:background .15s;text-align:center;vertical-align:middle;}
    td.td-left{text-align:left;font-weight:700;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:var(--bg2);}
    .badge{font-size:.74rem;padding:.18rem .6rem;border-radius:12px;font-weight:700;display:inline-block;}
    .badge.paid{background:var(--paid);color:var(--paid-c);}
    .badge.partial{background:var(--partial);color:var(--partial-c);}
    .badge.unpaid{background:var(--unpaid);color:var(--unpaid-c);}
    .bar-mini{height:7px;background:var(--bg2);border-radius:10px;min-width:60px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:.3rem;}
    .bar-mini-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--primary));border-radius:10px;}
    .th-sort-hint{font-size:.67rem;color:var(--muted);font-weight:400;display:block;}

    /* SORT */
    th.sortable{cursor:pointer;user-select:none;}
    th.sortable:hover{color:var(--primary);}
    th.sortable .sort-icon{margin-left:.3rem;opacity:.4;font-size:.7rem;}
    th.sortable.asc .sort-icon::before{content:'\f106';}
    th.sortable.desc .sort-icon::before{content:'\f107';}
    th.sortable.asc .sort-icon,th.sortable.desc .sort-icon{opacity:1;color:var(--primary);}

    /* ── Mobile: soi card grid ── */
    .soi-mobile-grid{display:none;}
    .soi-mcard{
      background:var(--card);border:1px solid var(--border);border-radius:16px;
      overflow:hidden;box-shadow:0 2px 10px var(--shadow2);
      transition:transform .15s,box-shadow .15s;
    }
    .soi-mcard:active{transform:scale(.98);}
    .soi-mcard-head{
      padding:.7rem 1rem;
      background:linear-gradient(135deg,var(--primary),var(--primary-d));
      color:#fff;display:flex;align-items:center;justify-content:space-between;
    }
    .soi-mcard-title{font-size:1.05rem;font-weight:800;}
    .soi-mcard-sub{font-size:.74rem;opacity:.85;}
    .soi-mcard-badge{
      background:rgba(255,255,255,.25);border-radius:20px;
      padding:.2rem .7rem;font-size:.8rem;font-weight:700;white-space:nowrap;
    }
    .soi-mcard-body{padding:.7rem .85rem;}
    .soi-mcard-halves{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
    .soi-mcard-half{border-radius:12px;overflow:hidden;border:1px solid var(--border);}
    .soi-mcard-half-head{
      padding:.45rem .75rem .35rem;font-size:.76rem;font-weight:800;
      display:flex;flex-direction:column;align-items:flex-start;gap:.1rem;
    }
    .soi-mcard-half-label{font-size:.72rem;font-weight:700;opacity:.9;margin-bottom:.05rem;}
    .soi-mcard-half-pct{font-size:1.3rem;font-weight:900;line-height:1;}
    .soi-mcard-half-body{background:var(--card2);padding:.5rem .75rem;}
    .soi-mcard-half-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.28rem;}
    .soi-mcard-half-row:last-child{margin-bottom:0;}
    .soi-mcard-half-lbl{font-size:.73rem;color:var(--muted);}
    .soi-mcard-half-val{font-size:.85rem;font-weight:700;}
    .soi-mcard-pbar{height:5px;background:rgba(255,255,255,.3);border-radius:6px;overflow:hidden;margin-top:.4rem;}
    .soi-mcard-pbar-fill{height:100%;background:rgba(255,255,255,.85);border-radius:6px;}

    @media(max-width:640px){
      .soi-table-wrap{display:none;}           /* ซ่อน table บน mobile */
      .soi-mobile-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:.75rem;
        padding:.9rem;
      }
    }
    /* dark mode: ปรับ soft color ของ half-head */
    [data-theme="dark"] .soi-mcard-half-body{background:var(--card2);}
    [data-theme="dark"] .soi-mcard-half-lbl{color:var(--muted);}
    .skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--card2) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;min-height:80px;}
    @keyframes shimmer{to{background-position:-200% 0;}}

    /* ── GENERAL RESPONSIVE ── */
    body{overflow-x:hidden;}
    main{overflow-x:hidden;}
    @media(max-width:640px){
      .half-grid{grid-template-columns:1fr;}
      .chart-grid{grid-template-columns:1fr;}
      .top-grid{grid-template-columns:1fr 1fr;}
      .toolbar{flex-direction:column;align-items:flex-start;gap:.5rem;}
      .toolbar h2{font-size:.95rem;}
      .year-select{width:100%;}
      .progress-top{flex-direction:column;align-items:flex-start;gap:.25rem;}
      .progress-detail{flex-wrap:wrap;gap:.2rem;}
      .soi-header{flex-direction:column;align-items:flex-start;gap:.3rem;}
    }
    @media(max-width:420px){
      .top-grid{grid-template-columns:1fr;}
      .chart-wrap{height:175px;}
      .stat-value{font-size:1.3rem;}
    }
  </style>
</head>
<body>
<nav>
  <div class="nav-brand"><i class="fa-solid fa-chart-pie"></i> สรุปค่าส่วนกลาง</div>
  <div class="nav-right">
    <button class="btn-theme" onclick="toggleTheme()"><i id="themeIcon" class="fa-solid fa-moon"></i></button>
    <a href="index.html" class="btn-nav" id="homeLink"><i class="fa-solid fa-house"></i> <span class="btn-nav-text">หน้าหลัก</span></a>
  </div>
</nav>

<!-- BOTTOM TAB BAR (mobile) + TOP TABS (desktop) -->
<div class="page-tabs" id="pageTabs">
  <a href="dashboard.html" class="page-tab" id="dashLink">
    <i class="fa-solid fa-house"></i>
    <span>ข้อมูลของฉัน</span>
  </a>
  <a href="summary.html" class="page-tab active">
    <i class="fa-solid fa-chart-pie"></i>
    <span>สรุปฯ</span>
  </a>
  <a href="announcements.html" class="page-tab">
    <i class="fa-solid fa-bullhorn"></i>
    <span>ประกาศ</span>
  </a>
  <a href="niti-report.html" class="page-tab">
    <i class="fa-solid fa-clipboard-list"></i>
    <span>ผลงานนิติ</span>
  </a>
</div>
<main>
  <div class="toolbar">
    <h2><i class="fa-solid fa-chart-bar"></i> สรุปการจ่ายค่าส่วนกลาง</h2>
    <div class="year-select" id="yearBtns"><span style="font-size:.82rem;color:var(--muted)">กำลังโหลด...</span></div>
  </div>
  <div class="top-grid" id="topGrid">
    <div class="stat-card"><div class="skeleton"></div></div>
    <div class="stat-card"><div class="skeleton"></div></div>
    <div class="stat-card"><div class="skeleton"></div></div>
    <div class="stat-card"><div class="skeleton"></div></div>
  </div>

  <!-- CHARTS -->
  <div class="chart-grid" id="chartGrid">
    <div class="chart-card"><div class="skeleton" style="height:220px"></div></div>
    <div class="chart-card"><div class="skeleton" style="height:220px"></div></div>
  </div>

  <div class="section-title"><i class="fa-solid fa-calendar-days"></i> ชำระแยกตามครึ่งปี (จำนวนหลัง)</div>
  <div class="half-grid" id="halfGrid">
    <div class="half-card"><div class="skeleton"></div></div>
    <div class="half-card"><div class="skeleton"></div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-top">
      <div class="progress-title"><i class="fa-solid fa-percent"></i> อัตราการชำระค่าส่วนกลางรวม (คิดจากยอดเงิน)</div>
      <div class="progress-pct" id="progressPct">—%</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-detail">
      <span>ชำระแล้ว <strong id="amtPaid">—</strong> บาท</span>
      <span>ยอดรวมที่ต้องชำระ <strong id="amtDue">—</strong> บาท</span>
    </div>
  </div>
  <div class="soi-card" id="soiCard">
    <div class="soi-header"><div class="soi-header-left"><i class="fa-solid fa-road"></i> รายละเอียดแยกตามซอย</div></div>
    <div class="skeleton" style="margin:1rem"></div>
  </div>
</main>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbwQbc31pY86tM7EdD41dBsXRQ-OmL6M5m0TJKs_ZJiix2bLEYkHOiQ8eIGazR7ay0_l/exec';
const token=localStorage.getItem('vms_token');
const role=localStorage.getItem('vms_role');

let currentYear='';
let lastData=null;
let donutChart=null,barChart=null;
let sortCol='', sortDir=1;

applyTheme(localStorage.getItem('vms_theme')||'light');
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeIcon').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';
  localStorage.setItem('vms_theme',t);
  redrawCharts();
}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}

if(!token)document.getElementById('dashLink').style.display='none';
if(role==='admin'){document.getElementById('homeLink').href='admin.html';document.getElementById('homeLink').innerHTML='<i class="fa-solid fa-shield-halved"></i> Admin';}

async function api(p){const r=await fetch(API_URL+'?'+new URLSearchParams(p));return r.json();}
function fmt(n){return Number(n||0).toLocaleString('th-TH');}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function barHtml(p){return`<div class="bar-mini"><div class="bar-mini-fill" style="width:${p}%"></div></div>`;}

async function init(){
  const d=await api({action:'getFeeSummary'});
  if(!d.success)return;
  const years=d.data.years||[];
  currentYear=years.length>0?years[0]:'';
  document.getElementById('yearBtns').innerHTML=years.length
    ?years.map(y=>`<button class="year-btn ${y===currentYear?'active':''}" onclick="selectYear(this,'${y}')">${y}</button>`).join('')
    :'<span style="font-size:.82rem;color:var(--muted)">ไม่มีข้อมูล</span>';
  if(currentYear&&currentYear!==d.data.year){const d2=await api({action:'getFeeSummary',year:currentYear});if(d2.success)renderSummary(d2.data);}
  else renderSummary(d.data);
}

async function selectYear(btn,year){
  document.querySelectorAll('.year-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');currentYear=year;setLoading();
  const d=await api({action:'getFeeSummary',year});
  if(d.success)renderSummary(d.data);
}

      <div class="half-row"><span class="half-lbl"><i class="fa-solid fa-circle-xmark" style="color:var(--unpaid-c)"></i> ยังไม่ชำระ</span><span class="half-val" style="color:var(--unpaid-c)">${h1Unpaid} หลัง</span></div>
      <div style="margin-top:.6rem"><div style="display:flex;justify-content:space-between;font-size:.77rem;color:var(--muted);margin-bottom:.3rem"><span>อัตราชำระ</span><span style="font-weight:700;color:var(--primary)">${h1pct}%</span></div>${barHtml(h1pct)}</div>
    </div>
    <div class="half-card">

      <div class="half-row"><span class="half-lbl"><i class="fa-solid fa-circle-check" style="color:var(--paid-c)"></i> ชำระครบแล้ว</span><span class="half-val" style="color:var(--paid-c)">${h2Paid} หลัง</span></div>
      <div class="half-row"><span class="half-lbl"><i class="fa-solid fa-circle-xmark" style="color:var(--unpaid-c)"></i> ยังไม่ชำระ</span><span class="half-val" style="color:var(--unpaid-c)">${h2Unpaid} หลัง</span></div>
      <div style="margin-top:.6rem"><div style="display:flex;justify-content:space-between;font-size:.77rem;color:var(--muted);margin-bottom:.3rem"><span>อัตราชำระ</span><span style="font-weight:700;color:var(--primary)">${h2pct}%</span></div>${barHtml(h2pct)}</div>

  // PROGRESS

function renderCharts(d){
  const{hFullPaid,hPartial,hUnpaid,bySoi,year}=d;
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const textC=isDark?'#a0aec0':'#8896ab';
  const gridC=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)';

  // DONUT
  document.getElementById('chartGrid').innerHTML=`
    <div class="chart-card">
      <div class="chart-title"><i class="fa-solid fa-chart-pie"></i> สัดส่วนการชำระ (จำนวนหลัง) ปี ${year}</div>
      <div class="chart-wrap"><canvas id="donutChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title"><i class="fa-solid fa-chart-bar"></i> เปรียบเทียบการชำระแยกซอย</div>
      <div class="chart-wrap"><canvas id="barChart"></canvas></div>
    </div>`;

  if(donutChart){donutChart.destroy();donutChart=null;}
  if(barChart){barChart.destroy();barChart=null;}

  // Donut chart
  const dCtx=document.getElementById('donutChart').getContext('2d');
  donutChart=new Chart(dCtx,{
    type:'doughnut',
    data:{
      labels:['ชำระครบ','ชำระบางส่วน','ยังไม่ชำระ'],
      datasets:[{data:[hFullPaid,hPartial,hUnpaid],backgroundColor:['#34c88a','#f6c26b','#f87171'],borderWidth:0,hoverOffset:6}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:textC,font:{family:'Sarabun',size:12},padding:14}},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw} หลัง`}}},cutout:'65%',animation:{animateScale:true}}
  });

  // Bar chart by soi
  const soiEntries=Object.entries(bySoi||{}).slice(0,8);
  const bCtx=document.getElementById('barChart').getContext('2d');
  barChart=new Chart(bCtx,{
    type:'bar',
    data:{
      labels:soiEntries.map(([s])=>s),
      datasets:[
        {label:'ชำระครบ',data:soiEntries.map(([,v])=>v.fullPaid),backgroundColor:'#34c88a',borderRadius:6},
        {label:'ค้างชำระ',data:soiEntries.map(([,v])=>v.unpaid+v.partial),backgroundColor:'#f87171',borderRadius:6}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:textC,font:{family:'Sarabun',size:12},padding:14}}},scales:{x:{stacked:true,ticks:{color:textC,font:{family:'Sarabun'}},grid:{color:gridC}},y:{stacked:true,ticks:{color:textC,font:{family:'Sarabun'},stepSize:1},grid:{color:gridC}}},animation:{duration:900,easing:'easeOutQuart'}}
  });
}

function redrawCharts(){if(lastData)renderCharts(lastData);}

function soiNum(s){
  // "ไม่ระบุ", "0", "", null → 0; ตัวเลขอื่น → parseInt
  if(!s||s==='ไม่ระบุ'||s==='0'||s===0) return 0;
  const n=parseInt(s,10);
  return isNaN(n)?0:n;
}

// ── soi filter state ─────────────────────────────────────────
let soiFilter='all'; // 'all' | '0' | '1' .. '21'

function getMergedEntries(d){
  const{bySoi}=d;
  const merged={};
  Object.entries(bySoi||{}).forEach(([soi,s])=>{
    const key=(soi===''||soi==='ไม่ระบุ'||soi==='0'||soi===0)?'0':String(soi);
    if(!merged[key]){merged[key]={...s};}
    else{
      merged[key].total    =(merged[key].total||0)    +(s.total||0);
      merged[key].fullPaid =(merged[key].fullPaid||0) +(s.fullPaid||0);
      merged[key].h1Paid   =(merged[key].h1Paid||0)   +(s.h1Paid||0);
      merged[key].h1Unpaid =(merged[key].h1Unpaid||0) +(s.h1Unpaid||0);
      merged[key].h2Paid   =(merged[key].h2Paid||0)   +(s.h2Paid||0);
      merged[key].h2Unpaid =(merged[key].h2Unpaid||0) +(s.h2Unpaid||0);
      merged[key].unpaid   =(merged[key].unpaid||0)   +(s.unpaid||0);
      merged[key].partial  =(merged[key].partial||0)  +(s.partial||0);
    }
  });
  return Object.entries(merged);
}

function renderSoiTable(d,col,dir){
  const{year}=d;
  let entries=getMergedEntries(d);

  if(soiFilter!=='all') entries=entries.filter(([k])=>k===soiFilter);

  if(col){
    entries.sort((a,b)=>{
      const va=col==='soi'?soiNum(a[0]):col==='total'?a[1].total:col==='fullPaid'?a[1].fullPaid:col==='unpaid'?a[1].unpaid:0;
      const vb=col==='soi'?soiNum(b[0]):col==='total'?b[1].total:col==='fullPaid'?b[1].fullPaid:col==='unpaid'?b[1].unpaid:0;
      return(va-vb)*dir;
    });
  }else{
    entries.sort((a,b)=>soiNum(a[0])-soiNum(b[0]));
  }

  // ── dropdown options ──────────────────────────────────────
  const allKeys=getMergedEntries(d).map(([k])=>k).sort((a,b)=>soiNum(a)-soiNum(b));
  const ddOpts=['<option value="all">ทุกซอย</option>',
    ...Array.from({length:22},(_,i)=>i).map(i=>{
      const v=String(i);
      const has=allKeys.includes(v);
      const sel=soiFilter===v?'selected':'';
      return`<option value="${v}" ${sel} ${has?'':'style="color:var(--muted)"'}>ซอย ${i}</option>`;
    })
  ].join('');

  // ── sortable th helper ────────────────────────────────────
  const si='<i class="fa-solid sort-icon" style="font-family:\'Font Awesome 6 Free\'"></i>';
  function sth(label,k,cls=''){
    const ac=sortCol===k?(sortDir===1?'asc':'desc'):'';
    return`<th class="sortable ${ac} ${cls}" onclick="doSort('${k}')">${label}${si}</th>`;
  }

  // ── Desktop table rows ────────────────────────────────────
  const rows=entries.map(([soi,s])=>{
    const h1p=pct(s.h1Paid,s.total),h2p=pct(s.h2Paid,s.total),fp=pct(s.fullPaid,s.total);
    const lbl=soi==='0'?'0':String(soiNum(soi));
    return`<tr>
      <td class="td-left">ซอย ${lbl}</td>
      <td><strong>${s.total}</strong> หลัง</td>
      <td><span class="badge paid">${s.fullPaid} หลัง</span><div style="font-size:.7rem;color:var(--paid-c)">${fp}%</div></td>
      <td style="border-left:2px solid var(--border)"><span style="font-weight:700;color:var(--paid-c)">${s.h1Paid}</span></td>
      <td><span style="font-weight:700;color:var(--unpaid-c)">${s.h1Unpaid}</span></td>
      <td><div style="display:flex;align-items:center;gap:.3rem">${barHtml(h1p)}<span style="font-size:.8rem;font-weight:700;color:var(--primary)">${h1p}%</span></div></td>
      <td style="border-left:2px solid var(--border)"><span style="font-weight:700;color:var(--paid-c)">${s.h2Paid}</span></td>
      <td><span style="font-weight:700;color:var(--unpaid-c)">${s.h2Unpaid}</span></td>
      <td><div style="display:flex;align-items:center;gap:.3rem">${barHtml(h2p)}<span style="font-size:.8rem;font-weight:700;color:var(--primary)">${h2p}%</span></div></td>
    </tr>`;
  }).join('');

  // ── Mobile card items ─────────────────────────────────────
  const cards=entries.map(([soi,s])=>{
    const h1p=pct(s.h1Paid,s.total),h2p=pct(s.h2Paid,s.total),fp=pct(s.fullPaid,s.total);
    const lbl=soi==='0'?'0':String(soiNum(soi));
    // สีหัว card soft tone ตาม % การชำระ
    const headBg  =fp>=80?'#dcfce7':fp>=40?'#fef9c3':'#fee2e2';
    const headText=fp>=80?'#166534':fp>=40?'#854d0e':'#991b1b';
    const headBdr =fp>=80?'#86efac':fp>=40?'#fde047':'#fca5a5';
    // สี half แบบ soft
    const h1Bg='#eff6ff'; const h1Text='#1d4ed8'; const h1Bdr='#bfdbfe';
    const h2Bg='#f5f3ff'; const h2Text='#6d28d9'; const h2Bdr='#ddd6fe';
    return`<div class="soi-mcard">
      <!-- หัว card: ชื่อซอย + สถิติรวม -->
      <div class="soi-mcard-head" style="background:${headBg};border-bottom:2px solid ${headBdr};padding:.65rem .85rem;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div class="soi-mcard-title" style="color:${headText}">ซอย ${lbl}</div>
          <div class="soi-mcard-sub" style="color:${headText};opacity:.75">${s.total} หลัง · ชำระครบ ${s.fullPaid} หลัง</div>
        </div>
        <div style="text-align:center;background:${headBdr};border-radius:12px;padding:.2rem .6rem;min-width:46px">
          <div style="font-size:1rem;font-weight:900;color:${headText}">${fp}%</div>
          <div style="font-size:.62rem;color:${headText};opacity:.8">ชำระแล้ว</div>
        </div>
      </div>
      <!-- body: 2 half cards -->
      <div class="soi-mcard-body">
        <div class="soi-mcard-halves">
          <!-- ครึ่งปีแรก -->
          <div class="soi-mcard-half" style="border-color:${h1Bdr}">
            <div class="soi-mcard-half-head" style="background:${h1Bg}">
              <div class="soi-mcard-half-label" style="color:${h1Text}">🌸 ครึ่งปีแรก</div>
              <div class="soi-mcard-half-pct" style="color:${h1Text}">${h1p}%</div>
              <div class="soi-mcard-pbar"><div class="soi-mcard-pbar-fill" style="width:${h1p}%;background:${h1Text}"></div></div>
            </div>
            <div class="soi-mcard-half-body">
              <div class="soi-mcard-half-row">
                <span class="soi-mcard-half-lbl">ชำระแล้ว</span>
                <span class="soi-mcard-half-val" style="color:#059669">${s.h1Paid} หลัง</span>
              </div>
              <div class="soi-mcard-half-row">
                <span class="soi-mcard-half-lbl">ค้างชำระ</span>
                <span class="soi-mcard-half-val" style="color:#dc2626">${s.h1Unpaid} หลัง</span>
              </div>
            </div>
          </div>
          <!-- ครึ่งปีหลัง -->
          <div class="soi-mcard-half" style="border-color:${h2Bdr}">
            <div class="soi-mcard-half-head" style="background:${h2Bg}">
              <div class="soi-mcard-half-label" style="color:${h2Text}">🍂 ครึ่งปีหลัง</div>
              <div class="soi-mcard-half-pct" style="color:${h2Text}">${h2p}%</div>
              <div class="soi-mcard-pbar"><div class="soi-mcard-pbar-fill" style="width:${h2p}%;background:${h2Text}"></div></div>
            </div>
            <div class="soi-mcard-half-body">
              <div class="soi-mcard-half-row">
                <span class="soi-mcard-half-lbl">ชำระแล้ว</span>
                <span class="soi-mcard-half-val" style="color:#059669">${s.h2Paid} หลัง</span>
              </div>
              <div class="soi-mcard-half-row">
                <span class="soi-mcard-half-lbl">ค้างชำระ</span>
                <span class="soi-mcard-half-val" style="color:#dc2626">${s.h2Unpaid} หลัง</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  const emptyRow='<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:2rem">ไม่มีข้อมูล</td></tr>';
  const emptyCard='<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:2rem">ไม่มีข้อมูล</div>';

  document.getElementById('soiCard').innerHTML=`
    <div class="soi-header">
      <div class="soi-header-left"><i class="fa-solid fa-road"></i> รายละเอียดแยกตามซอย — ปี ${year}</div>
      <div class="soi-header-right">
        <select class="soi-filter" onchange="doSoiFilter(this.value)">${ddOpts}</select>
        <span style="font-size:.72rem;color:var(--muted);display:none" class="sort-hint-desktop">คลิกหัวตารางเพื่อเรียง</span>
      </div>
    </div>

    <!-- ── Desktop table ── -->
    <div class="soi-table-wrap"><table>
      <thead>
        <tr>
          <th class="th-left sortable ${sortCol==='soi'?(sortDir===1?'asc':'desc'):''}" rowspan="2" onclick="doSort('soi')" style="vertical-align:middle;cursor:pointer">ซอย${si}</th>
          <th class="sortable ${sortCol==='total'?(sortDir===1?'asc':'desc'):''}" rowspan="2" onclick="doSort('total')" style="vertical-align:middle;cursor:pointer">ทั้งหมด${si}</th>
          <th class="sortable ${sortCol==='fullPaid'?(sortDir===1?'asc':'desc'):''}" rowspan="2" onclick="doSort('fullPaid')" style="vertical-align:middle;cursor:pointer">ชำระครบ${si}</th>
          <th colspan="3" class="th-group">🌸 ครึ่งปีแรก</th>
          <th colspan="3" class="th-group-r" style="border-left:2px solid #c4b5fd">🍂 ครึ่งปีหลัง</th>
        </tr>
        <tr>
          <th class="th-group" style="border-top:none">ชำระแล้ว</th>
          <th class="th-group" style="border-left:none;border-top:none">ค้างชำระ</th>
          <th class="th-group" style="border-left:none;border-top:none">%</th>
          <th class="th-group-r" style="border-left:2px solid #c4b5fd;border-top:none">ชำระแล้ว</th>
          <th class="th-group-r" style="border-left:none;border-top:none">ค้างชำระ</th>
          <th class="th-group-r" style="border-left:none;border-top:none">%</th>
        </tr>
      </thead>
      <tbody>${rows||emptyRow}</tbody>
    </table></div>

    <!-- ── Mobile card grid ── -->
    <div class="soi-mobile-grid">${cards||emptyCard}</div>`;

  const dd=document.querySelector('.soi-filter');
  if(dd) dd.value=soiFilter;
}

function doSort(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}
  if(lastData)renderSoiTable(lastData,sortCol,sortDir);
}

function doSoiFilter(val){
  soiFilter=val;
  sortCol=''; sortDir=1;
  if(lastData)renderSoiTable(lastData,sortCol,sortDir);
}

function setLoading(){
  document.getElementById('topGrid').innerHTML=Array(4).fill('<div class="stat-card"><div class="skeleton"></div></div>').join('');
  document.getElementById('chartGrid').innerHTML='<div class="chart-card"><div class="skeleton" style="height:220px"></div></div><div class="chart-card"><div class="skeleton" style="height:220px"></div></div>';
  document.getElementById('halfGrid').innerHTML='<div class="half-card"><div class="skeleton"></div></div><div class="half-card"><div class="skeleton"></div></div>';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('progressPct').textContent='—%';
  document.getElementById('amtPaid').textContent='—';
  document.getElementById('amtDue').textContent='—';
  document.getElementById('soiCard').innerHTML='<div class="soi-header"><div class="soi-header-left"><i class="fa-solid fa-road"></i> รายละเอียดแยกตามซอย</div></div><div class="skeleton" style="margin:1rem"></div>';
}

init();
</script>
