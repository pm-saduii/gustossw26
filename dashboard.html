<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏘️</text></svg>"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ข้อมูลของฉัน — ระบบบริหารหมู่บ้าน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.5/sweetalert2.all.min.js"></script>
  <style>
    :root{--primary:#4f7ef7;--primary-d:#2f5be8;--primary-l:#e8efff;--accent:#34c88a;--bg:#f0f4fd;--bg2:#e4ecfb;--card:#fff;--card2:#f8faff;--text:#1a2035;--text2:#4a5568;--muted:#8896ab;--border:#d0ddf5;--shadow:rgba(79,126,247,.15);--shadow2:rgba(0,0,0,.06);--paid:#d1fae5;--paid-c:#059669;--paid-b:#6ee7b7;--partial:#fef3c7;--partial-c:#d97706;--partial-b:#fcd34d;--unpaid:#fee2e2;--unpaid-c:#dc2626;--unpaid-b:#fca5a5;}
    [data-theme="dark"]{--primary:#6b9aff;--primary-d:#4f7ef7;--primary-l:#1a2540;--accent:#3dd68c;--bg:#0f1420;--bg2:#151c2e;--card:#1a2235;--card2:#202840;--text:#e8eeff;--text2:#a0aec0;--muted:#5a6a85;--border:#2a3650;--shadow:rgba(107,154,255,.12);--shadow2:rgba(0,0,0,.3);--paid:#0d2a1e;--paid-c:#34d399;--paid-b:#065f46;--partial:#2a2010;--partial-c:#fbbf24;--partial-b:#854d0e;--unpaid:#2a1010;--unpaid-c:#f87171;--unpaid-b:#7f1d1d;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}

    /* NAV */
    nav{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px var(--shadow);position:sticky;top:0;z-index:100;}
    .nav-brand{display:flex;align-items:center;gap:.6rem;font-size:1rem;font-weight:700;}
    .nav-right{display:flex;align-items:center;gap:.75rem;}
    .nav-name{font-size:.82rem;opacity:.9;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .btn-nav{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;padding:.35rem .8rem;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:.8rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;transition:background .15s;}
    .btn-nav:hover{background:rgba(255,255,255,.28);}
    .btn-theme{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;transition:background .15s;}
    .btn-theme:hover{background:rgba(255,255,255,.28);}

    /* PAGE TABS */
        /* ── PAGE TABS: desktop horizontal bar ── */
    .page-tabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;gap:0;transition:background .3s,border-color .3s;position:sticky;top:54px;z-index:100;}
    .page-tab{white-space:nowrap;padding:.72rem 1.1rem;font-size:.84rem;font-weight:600;text-decoration:none;color:var(--muted);border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:.4rem;transition:color .15s,border-color .15s;flex-shrink:0;}
    .page-tab i{font-size:.82rem;}
    .page-tab:hover{color:var(--primary);}
    .page-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
    .btn-nav-text{}
    /* ── PAGE TABS: mobile bottom navigation bar ── */
    @media(max-width:600px){
      body{padding-bottom:68px;}
      .page-tabs{position:fixed;bottom:0;left:0;right:0;top:auto;padding:0;border-bottom:none;border-top:1px solid var(--border);background:var(--card);box-shadow:0 -4px 20px rgba(0,0,0,.08);display:grid;grid-template-columns:repeat(4,1fr);gap:0;z-index:300;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
      .page-tab{flex-direction:column;align-items:center;justify-content:center;padding:.6rem .3rem .55rem;gap:.18rem;border-bottom:none;border-top:3px solid transparent;color:var(--muted);transition:color .15s,border-color .15s,background .15s;}
      .page-tab i{font-size:1.05rem;}
      .page-tab span{font-size:.67rem;font-weight:600;line-height:1;}
      .page-tab:hover{background:var(--bg2);color:var(--primary);}
      .page-tab.active{color:var(--primary);border-top-color:var(--primary);background:var(--primary-l);}
      .btn-nav-text{display:none;}
    }

    main{max-width:900px;margin:0 auto;padding:1.5rem 1rem;}

    /* HERO */
    .hero{background:linear-gradient(135deg,var(--primary),var(--primary-d));border-radius:20px;padding:1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;color:#fff;box-shadow:0 8px 28px var(--shadow);position:relative;overflow:hidden;animation:fadeSlideIn .4s ease both;}
    .hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;}
    .hero-icon{width:58px;height:58px;background:rgba(255,255,255,.2);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;backdrop-filter:blur(4px);}
    .hero-text h2{font-size:1.2rem;font-weight:700;}
    .hero-text p{font-size:.85rem;opacity:.85;margin-top:.2rem;}
    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

    /* SECTION */
    .section-title{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:.85rem;display:flex;align-items:center;gap:.5rem;animation:fadeSlideIn .4s ease both;}
    .section-title i{color:var(--primary);}

    /* STATUS BANNER */
    .status-banner{display:flex;align-items:center;gap:.75rem;padding:1rem 1.25rem;border-radius:14px;border:2px solid;margin-bottom:1.5rem;font-weight:700;font-size:1rem;animation:fadeSlideIn .4s .1s ease both;transition:background .3s,border-color .3s;}
    .status-banner .st-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
    .status-banner .st-label{font-size:.75rem;font-weight:500;opacity:.75;}
    .status-banner .st-value{font-size:1rem;font-weight:800;}
    .status-banner.normal{background:var(--paid);border-color:var(--paid-b);color:var(--paid-c);}
    .status-banner.overdue{background:var(--partial);border-color:var(--partial-b);color:var(--partial-c);}
    .status-banner.land{background:#ffedd5;border-color:#fb923c;color:#9a3412;}
    .status-banner.lawsuit{background:var(--unpaid);border-color:var(--unpaid-b);color:var(--unpaid-c);}
    [data-theme="dark"] .status-banner.land{background:#2a1a08;border-color:#c2410c;color:#fb923c;}

    /* INFO CARD */
    .info-card{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:1.5rem;box-shadow:0 2px 16px var(--shadow2);animation:fadeSlideIn .4s .15s ease both;transition:background .3s,border-color .3s;}
    .info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:0;}
    .info-item{padding:.95rem 1.2rem;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .15s;}
    .info-item:hover{background:var(--card2);}
    .info-label{font-size:.75rem;color:var(--muted);font-weight:600;margin-bottom:.25rem;display:flex;align-items:center;gap:.3rem;}
    .info-value{font-size:.95rem;font-weight:700;color:var(--text);}

    /* FEE */
    .fee-year{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:1rem;box-shadow:0 2px 10px var(--shadow2);animation:fadeSlideIn .4s .2s ease both;transition:background .3s,border-color .3s;}
    .fee-year-header{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem;background:var(--card2);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
    .fee-year-header:hover{background:var(--bg2);}
    .fee-year-title{font-weight:700;font-size:.95rem;display:flex;align-items:center;gap:.5rem;}
    .year-badge{font-size:.72rem;padding:.18rem .65rem;border-radius:20px;font-weight:700;}
    .year-badge.paid{background:var(--paid);color:var(--paid-c);}
    .year-badge.partial{background:var(--partial);color:var(--partial-c);}
    .year-badge.unpaid{background:var(--unpaid);color:var(--unpaid-c);}
    .fee-body{padding:1rem 1.2rem;}
    .half-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .half-card{border-radius:12px;padding:.9rem 1rem;border:1.5px solid var(--border);transition:background .3s,border-color .3s;}
    .half-card.paid{background:var(--paid);border-color:var(--paid-b);}
    .half-card.partial{background:var(--partial);border-color:var(--partial-b);}
    .half-card.unpaid{background:var(--unpaid);border-color:var(--unpaid-b);}
    .half-title{font-size:.82rem;font-weight:700;margin-bottom:.5rem;display:flex;align-items:center;gap:.3rem;}
    .half-row{font-size:.84rem;display:flex;justify-content:space-between;margin-bottom:.25rem;}
    .half-row span:first-child{color:var(--muted);}
    .half-row span:last-child{font-weight:700;}
    .half-short{font-size:.8rem;color:var(--unpaid-c);font-weight:700;margin-top:.4rem;}

    /* EMPTY / SKELETON */
    .empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
    .empty i{font-size:2.5rem;margin-bottom:.75rem;opacity:.4;display:block;}
    .skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--card2) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;}
    @keyframes shimmer{to{background-position:-200% 0;}}

    /* ── Cars section ─────────────────────────────── */
    .car-list{display:flex;flex-direction:column;gap:.75rem;}
    .car-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:.9rem 1.1rem;display:flex;align-items:center;gap:1rem;box-shadow:0 2px 10px var(--shadow2);transition:transform .15s,box-shadow .15s,background .3s;}
    .car-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--shadow);}
    .car-icon-wrap{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;}
    .car-icon-wrap.car{background:#dbeafe;}
    .car-icon-wrap.motorcycle{background:#fef9c3;}
    .car-icon-wrap.truck{background:#f3e8ff;}
    .car-icon-wrap.other{background:var(--bg2);}
    [data-theme="dark"] .car-icon-wrap.car{background:#1e3a5f;}
    [data-theme="dark"] .car-icon-wrap.motorcycle{background:#2a2010;}
    .car-info{flex:1;}
    .car-plate{font-size:1rem;font-weight:800;letter-spacing:.06em;color:var(--text);}
    .car-sub{font-size:.8rem;color:var(--muted);margin-top:.15rem;}
    .car-meta{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.45rem;}
    .car-tag{font-size:.7rem;padding:.15rem .55rem;border-radius:20px;font-weight:600;background:var(--bg2);color:var(--text2);}
    .car-tag.park{background:var(--primary-l);color:var(--primary);}
    .car-fee-badge{font-size:.78rem;font-weight:800;padding:.2rem .7rem;border-radius:20px;flex-shrink:0;}
    .car-fee-badge.free{background:var(--accent-l,#ecfdf5);color:#059669;}
    .car-fee-badge.paid{background:#fee2e2;color:#dc2626;}
    [data-theme="dark"] .car-fee-badge.free{background:#0d2a1e;color:#34d399;}
    [data-theme="dark"] .car-fee-badge.paid{background:#2a1010;color:#f87171;}

    @media(max-width:600px){.half-grid{grid-template-columns:1fr;}.hero{flex-direction:column;text-align:center;}.info-grid{grid-template-columns:1fr 1fr;}.nav-name{display:none;}}

    /* ── Car Request ── */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
    .modal-bg.open{opacity:1;pointer-events:all;}
    .modal-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:1.4rem 1.2rem 2.2rem;transform:translateY(40px);transition:transform .28s cubic-bezier(.32,1,.36,1);}
    .modal-bg.open .modal-sheet{transform:translateY(0);}
    @media(min-width:600px){.modal-bg{align-items:center;}.modal-sheet{border-radius:20px;max-height:85vh;}}
    .modal-drag{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto .9rem;}
    .modal-title{font-size:1rem;font-weight:800;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.7rem;}
    .form-row.full{grid-template-columns:1fr;}
    .form-grp label{display:block;font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:.25rem;text-transform:uppercase;}
    .form-grp input,.form-grp select,.form-grp textarea{width:100%;padding:.52rem .75rem;border:1.5px solid var(--border);border-radius:10px;background:var(--card2);color:var(--text);font-family:'Sarabun',sans-serif;font-size:.85rem;}
    .form-grp input:focus,.form-grp select:focus{outline:none;border-color:var(--primary);}
    .photo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.4rem;margin-top:.5rem;}
    .photo-slot{aspect-ratio:1;border-radius:10px;overflow:hidden;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg2);position:relative;transition:border-color .2s,background .2s;}
    .photo-slot:hover{border-color:var(--primary);background:var(--primary-l);}
    .photo-slot img{width:100%;height:100%;object-fit:cover;}
    .photo-slot .rm{position:absolute;top:3px;right:3px;background:rgba(220,38,38,.9);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
    .photo-slot .add-icon{font-size:1.3rem;color:var(--muted);pointer-events:none;}
    .req-list-item{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:.7rem .9rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.7rem;}
    .req-list-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;}
    .req-badge{font-size:.68rem;font-weight:700;padding:.15rem .55rem;border-radius:20px;display:inline-block;}
    .req-badge.pending{background:#fef3c7;color:#d97706;}
    .req-badge.approved{background:#d1fae5;color:#059669;}
    .req-badge.rejected{background:#fee2e2;color:#dc2626;}
    [data-theme=dark] .req-badge.pending{background:#2a2010;color:#fbbf24;}
    [data-theme=dark] .req-badge.approved{background:#0a2a1e;color:#34d399;}
    [data-theme=dark] .req-badge.rejected{background:#2a0a0a;color:#f87171;}
    .type-chips{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.3rem;}
    .type-chip{padding:.3rem .75rem;border-radius:20px;border:1.5px solid var(--border);font-size:.78rem;cursor:pointer;transition:all .15s;background:var(--card2);}
    .type-chip.sel{background:var(--primary);color:#fff;border-color:var(--primary);}
    .btn-full{width:100%;padding:.65rem;border-radius:12px;font-size:.9rem;font-weight:700;border:none;cursor:pointer;font-family:'Sarabun',sans-serif;display:flex;align-items:center;justify-content:center;gap:.45rem;transition:background .15s;}
    .btn-full.primary{background:var(--primary);color:#fff;}
    .btn-full.primary:hover{background:var(--primary-d);}
    .btn-full.outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
    .btn-full.outline:hover{border-color:var(--primary);color:var(--primary);}
    .req-photos-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.4rem;}
    .req-photos-row img{width:52px;height:52px;border-radius:8px;object-fit:cover;cursor:pointer;}
  </style>
</head>
<body>

<nav>
  <div class="nav-brand"><i class="fa-solid fa-house-chimney"></i> ระบบบริหารหมู่บ้าน</div>
  <div class="nav-right">
    <span class="nav-name" id="navName"></span>
    <button class="btn-theme" onclick="toggleTheme()"><i id="themeIcon" class="fa-solid fa-moon"></i></button>
    <button class="btn-nav" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> <span class="btn-nav-text">ออกจากระบบ</span></button>
  </div>
</nav>

<div class="page-tabs">
  <a href="dashboard.html" class="page-tab active"><i class="fa-solid fa-house"></i><span>ข้อมูลของฉัน</span></a>
  <a href="summary.html" class="page-tab"><i class="fa-solid fa-chart-pie"></i><span>สรุปค่าส่วนกลาง</span></a>
  <a href="announcements.html" class="page-tab"><i class="fa-solid fa-bullhorn"></i><span>ประกาศ</span></a>
  <a href="niti-report.html" class="page-tab"><i class="fa-solid fa-clipboard-list"></i><span>ผลงานนิติ</span></a>
</div>

<main>
  <div class="hero" id="heroSection">
    <div class="hero-icon"><i class="fa-solid fa-house-user"></i></div>
    <div class="hero-text">
      <h2 id="heroName">กำลังโหลด...</h2>
      <p id="heroSub">บ้านเลขที่ — | ซอย —</p>
    </div>
  </div>

  <div id="statusBanner"></div>

  <div class="section-title"><i class="fa-solid fa-id-card"></i> ข้อมูลส่วนตัว</div>
  <div class="info-card">
    <div class="info-grid" id="infoGrid">
      <div class="info-item"><div class="skeleton" style="height:40px"></div></div>
      <div class="info-item"><div class="skeleton" style="height:40px"></div></div>
      <div class="info-item"><div class="skeleton" style="height:40px"></div></div>
      <div class="info-item"><div class="skeleton" style="height:40px"></div></div>
    </div>
  </div>

  <!-- ── ยานพาหนะ header ── -->
  <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
    <span><i class="fa-solid fa-car"></i> ยานพาหนะของฉัน</span>
    <div style="display:flex;gap:.45rem">
      <button onclick="openReqModal('add',null)" style="background:var(--primary);color:#fff;border:none;border-radius:10px;padding:.38rem .85rem;font-size:.78rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:.35rem;font-family:'Sarabun',sans-serif"><i class="fa-solid fa-plus"></i> ขอเพิ่มรถ</button>
      <button onclick="openReqHistory()" style="background:var(--card);color:var(--text);border:1.5px solid var(--border);border-radius:10px;padding:.38rem .85rem;font-size:.78rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:.35rem;font-family:'Sarabun',sans-serif"><i class="fa-solid fa-clock-rotate-left"></i> ประวัติคำขอ</button>
    </div>
  </div>
  <div id="carContainer">
    <div class="car-list">
      <div class="car-card"><div class="skeleton" style="width:52px;height:52px;border-radius:14px;flex-shrink:0"></div><div style="flex:1"><div class="skeleton" style="height:20px;width:50%;margin-bottom:.4rem"></div><div class="skeleton" style="height:14px;width:70%"></div></div></div>
    </div>
  </div>

  <!-- ═══════ MODAL: Car Request ═══════ -->
  <div class="modal-bg" id="carReqModal" onclick="if(event.target===this)closeReqModal()">
    <div class="modal-sheet">
      <div class="modal-drag"></div>
      <div class="modal-title" id="reqModalTitle"><i class="fa-solid fa-car-side"></i> ขอเพิ่มรถใหม่</div>
      <input type="hidden" id="req_type"/>
      <input type="hidden" id="req_car_id"/>

      <!-- ประเภทรถ -->
      <div class="form-grp" style="margin-bottom:.7rem">
        <label>ประเภทยานพาหนะ</label>
        <div class="type-chips" id="req_type_chips">
          <div class="type-chip sel" data-val="car" onclick="selReqType('car',this)">🚗 รถยนต์</div>
          <div class="type-chip" data-val="motorcycle" onclick="selReqType('motorcycle',this)">🏍️ มอเตอร์ไซค์</div>
          <div class="type-chip" data-val="truck" onclick="selReqType('truck',this)">🚐 กระบะ/ตู้</div>
          <div class="type-chip" data-val="other" onclick="selReqType('other',this)">🚙 อื่นๆ</div>
        </div>
        <input type="hidden" id="req_car_type" value="car"/>
      </div>

      <div class="form-row">
        <div class="form-grp"><label>ป้ายทะเบียน *</label><input type="text" id="req_plate" placeholder="กข 1234"/></div>
        <div class="form-grp"><label>สีรถ</label><input type="text" id="req_color" placeholder="ขาว, ดำ, ..."/></div>
      </div>
      <div class="form-row">
        <div class="form-grp"><label>ยี่ห้อ</label><input type="text" id="req_brand" placeholder="TOYOTA"/></div>
        <div class="form-grp"><label>รุ่น</label><input type="text" id="req_model" placeholder="YARIS"/></div>
      </div>
      <div class="form-row">
        <div class="form-grp">
          <label>สถานที่จอด</label>
          <select id="req_park">
            <option value="หน้าบ้าน">🏠 หน้าบ้าน</option>
            <option value="ในบ้าน">🔒 ในบ้าน</option>
            <option value="ส่วนกลาง">🅿️ ส่วนกลาง</option>
            <option value="อื่นๆ">📍 อื่นๆ</option>
          </select>
        </div>
        <div class="form-grp"><label>ค่าจอด (บาท/เดือน)</label><input type="number" id="req_fee" placeholder="0" value="0"/></div>
      </div>
      <div class="form-row full">
        <div class="form-grp"><label>หมายเหตุ (ถ้ามี)</label><textarea id="req_note" rows="2" placeholder="ข้อมูลเพิ่มเติม..." style="resize:none"></textarea></div>
      </div>

      <!-- Photo upload (required for add, optional for edit) -->
      <div id="req_photo_section">
        <div class="form-grp">
          <label id="req_photo_label">📷 รูปรถ * (อย่างน้อย 1 รูป, สูงสุด 5 รูป)</label>
          <div class="photo-grid" id="req_photo_grid"></div>
          <input type="file" id="req_photo_input" accept="image/*" multiple style="display:none" onchange="onReqPhotos(this)"/>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:.55rem;margin-top:1.1rem">
        <button class="btn-full primary" id="reqSubmitBtn" onclick="submitReq()"><i class="fa-solid fa-paper-plane"></i> ส่งคำขอ</button>
        <button class="btn-full outline" onclick="closeReqModal()">ยกเลิก</button>
      </div>
    </div>
  </div>

  <!-- ═══════ MODAL: Request History ═══════ -->
  <div class="modal-bg" id="reqHistModal" onclick="if(event.target===this)closeReqHist()">
    <div class="modal-sheet">
      <div class="modal-drag"></div>
      <div class="modal-title"><i class="fa-solid fa-clock-rotate-left"></i> ประวัติคำขอรถของฉัน</div>
      <div id="reqHistList"><div style="text-align:center;padding:2rem;color:var(--muted)"><i class="fa-solid fa-spinner fa-spin"></i></div></div>
      <div style="margin-top:1rem">
        <button class="btn-full outline" onclick="closeReqHist()">ปิด</button>
      </div>
    </div>
  </div>

  <div class="section-title" style="margin-top:1.5rem"><i class="fa-solid fa-receipt"></i> ประวัติค่าส่วนกลาง</div>
  <div id="feeContainer">
    <div class="fee-year"><div class="fee-year-header"><div class="skeleton" style="width:200px;height:24px"></div></div></div>
  </div>
</main>

<script>
  const API_URL='https://script.google.com/macros/s/AKfycbwQbc31pY86tM7EdD41dBsXRQ-OmL6M5m0TJKs_ZJiix2bLEYkHOiQ8eIGazR7ay0_l/exec';
  const token=localStorage.getItem('vms_token');
  const name=localStorage.getItem('vms_name');
  if(!token){window.location.href='index.html';}
  document.getElementById('navName').textContent=name||'';

  // Theme
  const t=localStorage.getItem('vms_theme')||'light';
  applyTheme(t);
  function applyTheme(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('themeIcon').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';localStorage.setItem('vms_theme',t);}
  function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}

  async function api(p){
    const r=await fetch(API_URL+'?'+new URLSearchParams(p));
    const d=await r.json();
    // ✅ FIX: ตรวจ token หมดอายุ → redirect Login
    if(!d.success&&(d.message==='กรุณาเข้าสู่ระบบ'||d.message==='ไม่มีสิทธิ์เข้าถึง')){
      Swal.fire({icon:'warning',title:'Session หมดอายุ',text:'กรุณาเข้าสู่ระบบใหม่',confirmButtonColor:'#4f7ef7'})
        .then(()=>{localStorage.clear();window.location.href='index.html';});
    }
    return d;
  }

  async function loadInfo(){
    const d=await api({action:'getMyInfo',token});
    if(!d.success)return;
    const h=d.data;
    document.getElementById('heroName').textContent=h.owner_name;
    document.getElementById('heroSub').textContent=`บ้านเลขที่ ${h.house_no} | ${h.soi}`;
    const stCfg={
      'ปกติ':{bg:'var(--paid)',bc:'var(--paid-b)',c:'var(--paid-c)',icon:'fa-circle-check',cls:'normal'},
      'ค้างชำระ':{bg:'var(--partial)',bc:'var(--partial-b)',c:'var(--partial-c)',icon:'fa-triangle-exclamation',cls:'overdue'},
      'ระงับกรมที่ดิน':{bg:'#ffedd5',bc:'#fb923c',c:'#9a3412',icon:'fa-ban',cls:'land'},
      'ฟ้องร้อง':{bg:'var(--unpaid)',bc:'var(--unpaid-b)',c:'var(--unpaid-c)',icon:'fa-gavel',cls:'lawsuit'}
    };
    const acSt=h.account_status||'ปกติ';
    const st=stCfg[acSt]||stCfg['ปกติ'];
    document.getElementById('statusBanner').innerHTML=`
      <div class="status-banner ${st.cls}">
        <div class="st-icon"><i class="fa-solid ${st.icon}"></i></div>
        <div><div class="st-label">สถานะบัญชี</div><div class="st-value">${acSt}</div></div>
      </div>`;
    const typeIcon={'บ้านเดี่ยว':'fa-house','ทาวน์โฮม':'fa-building','บ้านแฝด':'fa-house-chimney-window'};
    const fields=[
      {label:'บ้านเลขที่',icon:'fa-map-pin',value:h.house_no},
      {label:'ชื่อ-นามสกุล',icon:'fa-user',value:h.owner_name},
      {label:'ที่อยู่',icon:'fa-location-dot',value:h.address},
      {label:'พื้นที่',icon:'fa-ruler-combined',value:h.area_sqm+' ตร.ม.'},
      {label:'ซอย',icon:'fa-road',value:h.soi},
      {label:'ประเภทบ้าน',icon:typeIcon[h.house_type]||'fa-house',value:h.house_type},
      {label:'เบอร์โทร',icon:'fa-phone',value:h.phone||'—'},
      {label:'ค่าส่วนกลาง/ครึ่งปี',icon:'fa-money-bill-wave',value:Number(h.fee_per_half).toLocaleString()+' บาท'},
    ];
    document.getElementById('infoGrid').innerHTML=fields.map(f=>`
      <div class="info-item">
        <div class="info-label"><i class="fa-solid ${f.icon}"></i> ${f.label}</div>
        <div class="info-value">${f.value}</div>
      </div>`).join('');
  }

  async function loadFees(){
    const d=await api({action:'getMyFees',token});
    if(!d.success||!d.data.length){
      document.getElementById('feeContainer').innerHTML=`<div class="empty"><i class="fa-solid fa-receipt"></i>ยังไม่มีข้อมูลค่าส่วนกลาง</div>`;return;
    }
    const fees=d.data.sort((a,b)=>b.year-a.year);
    document.getElementById('feeContainer').innerHTML=fees.map(f=>feeCard(f)).join('');
  }

  function feeCard(f){
    const h1s=f.h1_status||'unpaid',h2s=f.h2_status||'unpaid';
    const overall=(h1s==='paid'&&h2s==='paid')?'paid':(h1s==='unpaid'&&h2s==='unpaid')?'unpaid':'partial';
    const badgeLabel={paid:'✓ ชำระครบ',partial:'⚡ ชำระบางส่วน',unpaid:'✗ ยังไม่ชำระ'};
    const h1short=Math.max(0,Number(f.h1_amount)-Number(f.h1_paid));
    const h2short=Math.max(0,Number(f.h2_amount)-Number(f.h2_paid));
    return`<div class="fee-year">
      <div class="fee-year-header" onclick="toggleFee(this)">
        <div class="fee-year-title"><i class="fa-solid fa-calendar-days" style="color:var(--primary)"></i> ปี พ.ศ. ${f.year}</div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <span class="year-badge ${overall}">${badgeLabel[overall]}</span>
          <i class="fa-solid fa-chevron-down" style="color:var(--muted);transition:transform .25s"></i>
        </div>
      </div>
      <div class="fee-body">
        <div class="half-grid">
          ${halfCard('ครึ่งปีแรก (ม.ค.–มิ.ย.)',h1s,f.h1_amount,f.h1_paid,f.h1_date,h1short)}
          ${halfCard('ครึ่งปีหลัง (ก.ค.–ธ.ค.)',h2s,f.h2_amount,f.h2_paid,f.h2_date,h2short)}
        </div>
        ${f.note?`<p style="margin-top:.75rem;font-size:.8rem;color:var(--muted)"><i class="fa-solid fa-note-sticky"></i> ${f.note}</p>`:''}
      </div>
    </div>`;
  }

  function halfCard(title,status,amount,paid,date,short){
    const icon={paid:'fa-circle-check',partial:'fa-circle-half-stroke',unpaid:'fa-circle-xmark'};
    const col={paid:'var(--paid-c)',partial:'var(--partial-c)',unpaid:'var(--unpaid-c)'};
    return`<div class="half-card ${status}">
      <div class="half-title" style="color:${col[status]}"><i class="fa-solid ${icon[status]}"></i> ${title}</div>
      <div class="half-row"><span>ยอดที่ต้องชำระ</span><span>${Number(amount).toLocaleString()} บาท</span></div>
      <div class="half-row"><span>ชำระแล้ว</span><span>${Number(paid).toLocaleString()} บาท</span></div>
      ${date?`<div class="half-row"><span>วันที่ชำระ</span><span>${date}</span></div>`:''}
      ${short>0?`<div class="half-short"><i class="fa-solid fa-triangle-exclamation"></i> ค้างชำระ ${short.toLocaleString()} บาท</div>`:''}
    </div>`;
  }

  function toggleFee(el){
    const body=el.nextElementSibling;
    const icon=el.querySelector('.fa-chevron-down');
    const open=body.style.display!=='none';
    body.style.display=open?'none':'block';
    icon.style.transform=open?'rotate(-90deg)':'';
  }

  function logout(){
    Swal.fire({icon:'question',title:'ออกจากระบบ?',text:'ต้องการออกจากระบบหรือไม่',showCancelButton:true,confirmButtonText:'ออกจากระบบ',cancelButtonText:'ยกเลิก',confirmButtonColor:'#dc2626',cancelButtonColor:'#4f7ef7'})
    .then(r=>{if(r.isConfirmed){localStorage.removeItem('vms_token');localStorage.removeItem('vms_role');localStorage.removeItem('vms_name');localStorage.removeItem('vms_house');window.location.href='index.html';}});
  }

  // ── loadCars ──────────────────────────────────────────────
  let _myCars = [];
  async function loadCars(){
    const house_id=localStorage.getItem('vms_house');
    if(!house_id){document.getElementById('carContainer').innerHTML='<p style="color:var(--muted);font-size:.85rem;padding:.5rem 0">ไม่พบข้อมูลบ้าน</p>';return;}
    const d=await api({action:'getCars',house_id,token});
    _myCars=d.success?d.data:[];
    if(!_myCars.length){
      document.getElementById('carContainer').innerHTML='<p style="color:var(--muted);font-size:.85rem;padding:.5rem 0"><i class="fa-solid fa-car-side" style="opacity:.4"></i> ยังไม่มียานพาหนะที่ได้รับอนุมัติ</p>';return;
    }
    const typeIcon={car:'🚗',motorcycle:'🏍️',truck:'🚐',other:'🚙'};
    const parkIcon={'หน้าบ้าน':'🏠','ในบ้าน':'🔒','ส่วนกลาง':'🅿️','อื่นๆ':'📍'};
    const typeLabel={car:'รถยนต์',motorcycle:'มอเตอร์ไซค์',truck:'รถกระบะ/ตู้',other:'อื่นๆ'};
    document.getElementById('carContainer').innerHTML='<div class="car-list">'+_myCars.map(c=>{
      const fee=parseFloat(c.car_fee)||0;
      const typeKey=c.car_type||'car';
      return`<div class="car-card" style="animation:fadeSlideIn .3s ease both;cursor:pointer" onclick="openReqModal('edit','${c.car_id}')">
        <div class="car-icon-wrap ${typeKey}">${typeIcon[typeKey]||'🚗'}</div>
        <div class="car-info">
          <div class="car-plate">${c.plate_no||'ไม่ระบุทะเบียน'}</div>
          <div class="car-sub">${c.car_brand||''} ${c.car_model||''} · สี${c.car_color||'—'}</div>
          <div class="car-meta">
            <span class="car-tag">${typeLabel[typeKey]||typeKey}</span>
            <span class="car-tag park">${parkIcon[c.car_park]||''} ${c.car_park||'—'}</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.3rem">
          <div class="car-fee-badge ${fee>0?'paid':'free'}">${fee>0?fee.toLocaleString()+' ฿/เดือน':'ฟรี'}</div>
          <span style="font-size:.65rem;color:var(--primary);font-weight:700"><i class="fa-solid fa-pen"></i> ขอแก้ไข</span>
        </div>
      </div>`;
    }).join('')+'</div>';
  }

  // ── Car Request Modal ──────────────────────────────────────
  let _reqPhotos = []; // [{dataUrl, file}]

  function openReqModal(type, carId) {
    _reqPhotos = [];
    _photoLoading = 0;
    renderPhotoGrid();
    _updateSubmitBtn();
    // reset form
    ['req_plate','req_color','req_brand','req_model','req_note'].forEach(id=>{
      const el=document.getElementById(id); if(el) el.value='';
    });
    document.getElementById('req_fee').value='0';
    document.getElementById('req_car_type').value='car';
    document.getElementById('req_park').value='หน้าบ้าน';
    document.querySelectorAll('#req_type_chips .type-chip').forEach(c=>{
      c.classList.toggle('sel', c.dataset.val==='car');
    });

    document.getElementById('req_type').value = type;
    document.getElementById('req_car_id').value = carId || '';

    if (type === 'edit' && carId) {
      const car = _myCars.find(c=>c.car_id===carId);
      document.getElementById('reqModalTitle').innerHTML = '<i class="fa-solid fa-pen"></i> ขอแก้ไขข้อมูลรถ';
      document.getElementById('req_photo_label').textContent = '📷 รูปรถ (ไม่บังคับสำหรับการแก้ไข)';
      if (car) {
        document.getElementById('req_plate').value  = car.plate_no  || '';
        document.getElementById('req_color').value  = car.car_color || '';
        document.getElementById('req_brand').value  = car.car_brand || '';
        document.getElementById('req_model').value  = car.car_model || '';
        document.getElementById('req_fee').value    = car.car_fee   || '0';
        document.getElementById('req_park').value   = car.car_park  || 'หน้าบ้าน';
        document.getElementById('req_car_type').value = car.car_type || 'car';
        document.querySelectorAll('#req_type_chips .type-chip').forEach(c=>{
          c.classList.toggle('sel', c.dataset.val===(car.car_type||'car'));
        });
      }
    } else {
      document.getElementById('reqModalTitle').innerHTML = '<i class="fa-solid fa-car-side"></i> ขอเพิ่มรถใหม่';
      document.getElementById('req_photo_label').textContent = '📷 รูปรถ * (อย่างน้อย 1 รูป, สูงสุด 5 รูป)';
    }
    document.getElementById('carReqModal').classList.add('open');
  }

  function closeReqModal() {
    document.getElementById('carReqModal').classList.remove('open');
  }

  function selReqType(val, el) {
    document.querySelectorAll('#req_type_chips .type-chip').forEach(c=>c.classList.remove('sel'));
    el.classList.add('sel');
    document.getElementById('req_car_type').value = val;
  }

  function renderPhotoGrid() {
    const grid = document.getElementById('req_photo_grid');
    let html = _reqPhotos.map((p,i)=>`
      <div class="photo-slot">
        <img src="${p.dataUrl}"/>
        <button class="rm" onclick="removeReqPhoto(${i})">✕</button>
      </div>`).join('');
    if (_reqPhotos.length < 5) {
      html += `<div class="photo-slot" onclick="document.getElementById('req_photo_input').click()">
        <span class="add-icon">＋</span>
      </div>`;
    }
    grid.innerHTML = html;
  }

  let _photoLoading = 0; // นับรูปที่กำลัง load

  function onReqPhotos(input) {
    const files = Array.from(input.files);
    const remaining = 5 - _reqPhotos.length;
    const toLoad = files.slice(0, remaining);
    if (!toLoad.length) { input.value=''; return; }

    _photoLoading += toLoad.length;
    _updateSubmitBtn();

    toLoad.forEach(f=>{
      const reader = new FileReader();
      reader.onload = e => {
        _reqPhotos.push({dataUrl:e.target.result, file:f});
        _photoLoading = Math.max(0, _photoLoading - 1);
        renderPhotoGrid();
        _updateSubmitBtn();
      };
      reader.onerror = () => {
        _photoLoading = Math.max(0, _photoLoading - 1);
        _updateSubmitBtn();
      };
      reader.readAsDataURL(f);
    });
    input.value = '';
  }

  function _updateSubmitBtn() {
    const btn = document.getElementById('reqSubmitBtn');
    if (!btn) return;
    if (_photoLoading > 0) {
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> กำลังโหลดรูป (${_photoLoading})...`;
    } else {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> ส่งคำขอ';
    }
  }

  function removeReqPhoto(i) {
    _reqPhotos.splice(i,1);
    renderPhotoGrid();
  }

  async function submitReq() {
    const reqType = document.getElementById('req_type').value;
    const plate   = document.getElementById('req_plate').value.trim();
    const house_id = localStorage.getItem('vms_house');

    if (!plate) { alert('กรุณากรอกป้ายทะเบียน'); return; }
    if (reqType === 'add' && _reqPhotos.length === 0) {
      alert('กรุณาแนบรูปรถอย่างน้อย 1 รูป'); return;
    }

    const btn = document.getElementById('reqSubmitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังส่ง...';

    try {
      // แปลงรูปเป็น base64 object
      const photos = await Promise.all(_reqPhotos.map(async p=>{
        const ext = p.file.name.split('.').pop().toLowerCase() || 'jpg';
        const base64 = p.dataUrl.split(',')[1];
        return { base64, mimeType: p.file.type || 'image/jpeg', ext };
      }));

      const payload = {
        action: 'submitCarRequest',
        token,
        house_id,
        request_type: reqType,
        car_id:    document.getElementById('req_car_id').value,
        car_type:  document.getElementById('req_car_type').value,
        plate_no:  plate,
        car_brand: document.getElementById('req_brand').value.trim(),
        car_model: document.getElementById('req_model').value.trim(),
        car_color: document.getElementById('req_color').value.trim(),
        car_park:  document.getElementById('req_park').value,
        car_fee:   parseFloat(document.getElementById('req_fee').value)||0,
        note:      document.getElementById('req_note').value.trim(),
        photos
      };

      const r = await api(payload);
      if (r.success) {
        closeReqModal();
        alert('✅ ' + r.message);
      } else {
        alert('❌ ' + (r.message||'เกิดข้อผิดพลาด'));
      }
    } catch(e) {
      alert('เกิดข้อผิดพลาด: ' + e.message);
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> ส่งคำขอ';
  }

  // ── Request History Modal ──────────────────────────────────
  async function openReqHistory() {
    document.getElementById('reqHistModal').classList.add('open');
    document.getElementById('reqHistList').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted)"><i class="fa-solid fa-spinner fa-spin"></i> กำลังโหลด...</div>';
    const house_id = localStorage.getItem('vms_house');
    const r = await api({action:'getMyCarRequests', token, house_id});
    const list = r.success ? r.data : [];
    if (!list.length) {
      document.getElementById('reqHistList').innerHTML = '<p style="text-align:center;color:var(--muted);padding:2rem">ยังไม่มีประวัติคำขอ</p>';
      return;
    }
    const statusLabel = {pending:'⏳ รอการอนุมัติ', approved:'✅ อนุมัติแล้ว', rejected:'❌ ไม่อนุมัติ'};
    const typeLabel   = {add:'ขอเพิ่มรถ', edit:'ขอแก้ไขรถ'};
    const typeIcon    = {car:'🚗', motorcycle:'🏍️', truck:'🚐', other:'🚙'};
    document.getElementById('reqHistList').innerHTML = list.map(r=>{
      const photos = (r.photo_urls||'').split(',').filter(Boolean);
      return `<div class="req-list-item">
        <div class="req-list-icon" style="background:var(--primary-l)">${typeIcon[r.car_type]||'🚗'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:.88rem">${r.plate_no||'ไม่ระบุทะเบียน'}</div>
          <div style="font-size:.73rem;color:var(--muted)">${typeLabel[r.request_type]||r.request_type} · ${r.submitted_at||''}</div>
          ${photos.length?`<div class="req-photos-row">${photos.slice(0,3).map(u=>`<img src="${u}" onclick="window.open('${u}','_blank')">`).join('')}</div>`:''}
          ${r.note?`<div style="font-size:.72rem;color:var(--muted);margin-top:.2rem">📝 ${r.note}</div>`:''}
          ${r.status==='rejected'&&r.note?`<div style="font-size:.72rem;color:#dc2626;margin-top:.2rem">เหตุผล: ${r.note}</div>`:''}
        </div>
        <span class="req-badge ${r.status}">${statusLabel[r.status]||r.status}</span>
      </div>`;
    }).join('');
  }

  function closeReqHist() {
    document.getElementById('reqHistModal').classList.remove('open');
  }

  loadInfo();
  loadFees();
  loadCars();
</script>
</body>
</html>
