<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ข้อมูลของฉัน — ระบบบริหารหมู่บ้าน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="config.js"></script>
  <style>
    :root{--primary:#4f7ef7;--primary-d:#2f5be8;--primary-l:#e8efff;--accent:#34c88a;--bg:#f0f4fd;--bg2:#e4ecfb;--card:#fff;--card2:#f8faff;--text:#1a2035;--text2:#4a5568;--muted:#8896ab;--border:#d0ddf5;--shadow:rgba(79,126,247,.15);--shadow2:rgba(0,0,0,.06);--paid:#d1fae5;--paid-c:#059669;--paid-b:#6ee7b7;--partial:#fef3c7;--partial-c:#d97706;--partial-b:#fcd34d;--unpaid:#fee2e2;--unpaid-c:#dc2626;--unpaid-b:#fca5a5;}
    [data-theme="dark"]{--bg:#0f172a;--bg2:#1e293b;--card:#1e293b;--card2:#334155;--text:#f8fafc;--text2:#cbd5e1;--muted:#94a3b8;--border:#334155;--shadow:rgba(0,0,0,.3);--primary-l:rgba(79,126,247,.1);}
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Sarabun',sans-serif;}
    body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
    .nav{background:var(--card);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 6px -1px var(--shadow2);border-bottom:1px solid var(--border);}
    .nav-brand{display:flex;align-items:center;gap:12px;font-weight:700;font-size:1.25rem;color:var(--primary);}
    .user-info{display:flex;align-items:center;gap:10px;font-size:0.9rem;font-weight:600;}
    .container{max-width:800px;margin:20px auto;padding:0 16px;}
    .welcome-card{background:linear-gradient(135deg, var(--primary), var(--primary-d));color:#fff;padding:24px;border-radius:20px;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:0 10px 15px -3px var(--shadow);}
    .welcome-card i{position:absolute;right:-20px;bottom:-20px;font-size:120px;opacity:0.1;}
    .welcome-card h2{font-size:1.4rem;margin-bottom:4px;}
    .house-box{background:rgba(255,255,255,0.15);padding:8px 16px;border-radius:12px;display:inline-block;margin-top:12px;font-weight:500;}
    .section-title{display:flex;align-items:center;gap:10px;margin:24px 0 16px;font-weight:700;font-size:1.1rem;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .info-card{background:var(--card);padding:20px;border-radius:18px;border:1px solid var(--border);box-shadow:0 4px 6px var(--shadow2);}
    .info-label{color:var(--muted);font-size:0.8rem;margin-bottom:4px;display:block;}
    .info-value{font-weight:600;font-size:1.05rem;}
    .fee-list{display:flex;flex-direction:column;gap:12px;}
    .fee-item{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;}
    .fee-header{padding:16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
    .fee-month{font-weight:700;display:flex;align-items:center;gap:10px;}
    .status-badge{padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;}
    .status-badge.paid{background:var(--paid);color:var(--paid-c);}
    .status-badge.partial{background:var(--partial);color:var(--partial-c);}
    .status-badge.unpaid{background:var(--unpaid);color:var(--unpaid-c);}
    .fee-body{padding:0 16px 16px;display:none;border-top:1px dashed var(--border);padding-top:16px;}
    .half-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
    .half-card{padding:12px;border-radius:12px;font-size:0.85rem;}
    .half-card.paid{background:var(--paid);border:1px solid var(--paid-b);}
    .half-card.partial{background:var(--partial);border:1px solid var(--partial-b);}
    .half-card.unpaid{background:var(--unpaid);border:1px solid var(--unpaid-b);}
    .half-title{font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .half-row{display:flex;justify-content:space-between;margin-bottom:4px;color:var(--text2);}
    .half-short{margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,0.05);font-weight:700;color:var(--unpaid-c);}
    .menu-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;justify-content:space-around;padding:12px;border-top:1px solid var(--border);box-shadow:0 -4px 10px var(--shadow2);z-index:100;}
    .menu-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);text-decoration:none;font-size:0.75rem;font-weight:500;flex:1;}
    .menu-item.active{color:var(--primary);}
    .menu-item i{font-size:1.25rem;}
    .skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--bg2) 50%,var(--border) 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:10px;}
    @keyframes loading{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
    @media (max-width:480px){ .grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-brand"><i class="fa-solid fa-city"></i> VMS</div>
    <div class="user-info" id="userInfo">
      <span id="userName">...</span>
      <i class="fa-solid fa-circle-user" style="font-size:1.5rem;color:var(--primary)"></i>
    </div>
  </nav>

  <div class="container">
    <div class="welcome-card">
      <i class="fa-solid fa-house-chimney"></i>
      <h2 id="greetName">สวัสดีคุณ ...</h2>
      <p style="opacity:0.9">ยินดีต้อนรับสู่ระบบสมาชิกลูกบ้าน</p>
      <div class="house-box" id="houseIdDisp">บ้านเลขที่ —</div>
    </div>

    <div class="section-title"><i class="fa-solid fa-address-card" style="color:var(--primary)"></i> ข้อมูลทั่วไป</div>
    <div class="grid" id="infoGrid">
      <div class="info-card"><span class="info-label">เจ้าของบ้าน</span><div class="info-value skeleton" style="height:20px;width:100px"></div></div>
      <div class="info-card"><span class="info-label">ซอย</span><div class="info-value skeleton" style="height:20px;width:60px"></div></div>
      <div class="info-card"><span class="info-label">เบอร์โทรศัพท์</span><div class="info-value skeleton" style="height:20px;width:120px"></div></div>
      <div class="info-card"><span class="info-label">อีเมล</span><div class="info-value skeleton" style="height:20px;width:140px"></div></div>
    </div>

    <div class="section-title"><i class="fa-solid fa-file-invoice-dollar" style="color:var(--accent)"></i> ประวัติการชำระเงินส่วนกลาง</div>
    <div class="fee-list" id="feeList">
      <div class="skeleton" style="height:60px;border-radius:16px;"></div>
      <div class="skeleton" style="height:60px;border-radius:16px;margin-top:10px;"></div>
    </div>
  </div>

  <div class="menu-bar">
    <a href="dashboard.html" class="menu-item active"><i class="fa-solid fa-house"></i><span>หน้าหลัก</span></a>
    <a href="announcements.html" class="menu-item"><i class="fa-solid fa-bullhorn"></i><span>ประกาศ</span></a>
    <a href="niti-report.html" class="menu-item"><i class="fa-solid fa-chart-line"></i><span>ผลงานนิติ</span></a>
    <a href="summary.html" class="menu-item"><i class="fa-solid fa-file-contract"></i><span>สรุปยอด</span></a>
    <a href="#" class="menu-item" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>ออก</span></a>
  </div>

  <script>
    // ตรวจสอบ Theme
    if(localStorage.getItem('vms_theme')==='dark') document.documentElement.setAttribute('data-theme','dark');

    // โหลดข้อมูลเมื่อเปิดหน้า
    document.addEventListener('DOMContentLoaded', () => {
      const name = localStorage.getItem('vms_name') || 'สมาชิก';
      const houseId = localStorage.getItem('vms_house');
      
      document.getElementById('userName').textContent = name;
      document.getElementById('greetName').textContent = `สวัสดีคุณ ${name}`;
      document.getElementById('houseIdDisp').textContent = `บ้านเลขที่ ${houseId || '—'}`;
      
      loadData();
    });

    async function loadData() {
      const houseId = localStorage.getItem('vms_house');
      if (!houseId) return;

      try {
        // ใช้ apiCall ดึงข้อมูลข้อมูลบ้าน
        const infoRes = await apiCall({ action: 'getMyInfo' });
        if (infoRes && infoRes.success) {
          renderInfo(infoRes.data);
        }

        // ใช้ apiCall ดึงข้อมูลค่าส่วนกลาง
        const feeRes = await apiCall({ action: 'getMyFees' });
        if (feeRes && feeRes.success) {
          renderFees(feeRes.data);
        }
      } catch (e) {
        console.error("Load Data Error:", e);
      }
    }

    function renderInfo(h) {
      if (!h) return;
      document.getElementById('infoGrid').innerHTML = `
        <div class="info-card"><span class="info-label">เจ้าของบ้าน</span><div class="info-value">${h.owner_name || '—'}</div></div>
        <div class="info-card"><span class="info-label">ซอย</span><div class="info-value">${h.soi || '—'}</div></div>
        <div class="info-card"><span class="info-label">เบอร์โทรศัพท์</span><div class="info-value">${h.phone || '—'}</div></div>
        <div class="info-card"><span class="info-label">อีเมล</span><div class="info-value">${h.email || '—'}</div></div>
      `;
    }

    function renderFees(list) {
      const container = document.getElementById('feeList');
      if (!list || list.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">ไม่พบข้อมูลการชำระเงิน</div>';
        return;
      }
      // เรียงจากเดือน/ปี ล่าสุดขึ้นก่อน
      const sorted = list.sort((a,b) => (b.year + b.month.padStart(2,'0')) - (a.year + a.month.padStart(2,'0')));
      
      container.innerHTML = sorted.map((f, i) => {
        const statusText = f.status === 'paid' ? 'ชำระแล้ว' : (f.status === 'partial' ? 'ชำระบางส่วน' : 'ยังไม่ชำระ');
        return `
          <div class="fee-item">
            <div class="fee-header" onclick="toggleFee(this)">
              <div class="fee-month">
                <i class="fa-solid fa-calendar-check" style="color:var(--primary)"></i>
                ${getMonthName(f.month)} ${f.year}
              </div>
              <div style="display:flex;align-items:center;gap:12px">
                <span class="status-badge ${f.status}">${statusText}</span>
                <i class="fa-solid fa-chevron-down" style="color:var(--muted);font-size:0.8rem;transition:0.3s"></i>
              </div>
            </div>
            <div class="fee-body">
              <div style="font-size:0.85rem;color:var(--text2)">เลขที่อ้างอิง: <span style="font-weight:600">${f.fee_id}</span></div>
              <div class="half-grid">
                ${buildHalfCard(f.status, 'รายละเอียด', f.amount, f.paid_amount, f.paid_date)}
              </div>
              ${f.remark ? `<div style="margin-top:10px;font-size:0.8rem;color:var(--muted)"><b>หมายเหตุ:</b> ${f.remark}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function buildHalfCard(status, title, amount, paid, date) {
      const short = amount - paid;
      const icon = {paid:'fa-check-circle', partial:'fa-spinner', unpaid:'fa-clock'};
      const col = {paid:'var(--paid-c)', partial:'var(--partial-c)', unpaid:'var(--unpaid-c)'};
      return `
        <div class="half-card ${status}">
          <div class="half-title" style="color:${col[status]}"><i class="fa-solid ${icon[status]}"></i> ${title}</div>
          <div class="half-row"><span>ยอดที่ต้องชำระ</span><span>${Number(amount).toLocaleString()} บาท</span></div>
          <div class="half-row"><span>ชำระแล้ว</span><span>${Number(paid).toLocaleString()} บาท</span></div>
          ${date ? `<div class="half-row"><span>วันที่ชำระ</span><span>${date}</span></div>` : ''}
          ${short > 0 ? `<div class="half-short"><i class="fa-solid fa-triangle-exclamation"></i> ค้างชำระ ${short.toLocaleString()} บาท</div>` : ''}
        </div>`;
    }

    function getMonthName(m) {
      const months = ["","มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
      return months[parseInt(m)] || m;
    }

    function toggleFee(el) {
      const body = el.nextElementSibling;
      const icon = el.querySelector('.fa-chevron-down');
      const isOpen = body.style.display === 'block';
      body.style.display = isOpen ? 'none' : 'block';
      icon.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(-180deg)';
    }

    function logout() {
      Swal.fire({
        title: 'ออกจากระบบ?',
        text: "ต้องการออกจากระบบหรือไม่",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#dc2626',
        cancelButtonColor: '#4f7ef7',
        confirmButtonText: 'ออกจากระบบ',
        cancelButtonText: 'ยกเลิก'
      }).then((result) => {
        if (result.isConfirmed) {
          localStorage.clear();
          window.location.href = 'index.html';
        }
      });
    }
  </script>
</body>
</html>
