<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เข้าสู่ระบบ — ระบบบริหารหมู่บ้าน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="config.js"></script>
  <style>
    :root {
      --primary:#4f7ef7; --primary-d:#2f5be8; --primary-l:#e8efff;
      --accent:#34c88a; --accent-d:#1ea870;
      --bg:#f0f4fd; --bg2:#e4ecfb; --card:#ffffff; --card2:#f8faff;
      --text:#1a2035; --text2:#4a5568; --muted:#8896ab;
      --border:#d0ddf5; --shadow:rgba(79,126,247,.15); --shadow2:rgba(0,0,0,.06);
    }
    [data-theme="dark"] {
      --bg:#0f172a; --bg2:#1e293b; --card:#1e293b; --card2:#334155;
      --text:#f8fafc; --text2:#cbd5e1; --muted:#94a3b8;
      --border:#334155; --shadow:rgba(0,0,0,.3);
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Sarabun',sans-serif;transition:background-color .3s,color .3s,border-color .3s;}
    body{background:var(--bg);color:var(--text);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;}
    .login-card{background:var(--card);width:100%;max-width:400px;border-radius:24px;padding:40px;box-shadow:0 20px 25px -5px var(--shadow),0 10px 10px -5px var(--shadow2);border:1px solid var(--border);position:relative;overflow:hidden;}
    .login-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:5px;background:linear-gradient(90deg,var(--primary),var(--accent));}
    .header{text-align:center;margin-bottom:32px;}
    .logo-area{width:64px;height:64px;background:var(--primary-l);color:var(--primary);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;}
    h1{font-size:1.5rem;font-weight:700;color:var(--text);margin-bottom:8px;}
    .subtitle{color:var(--muted);font-size:0.9rem;}
    .input-group{margin-bottom:20px;position:relative;}
    .input-group label{display:block;margin-bottom:8px;font-size:0.85rem;font-weight:600;color:var(--text2);padding-left:4px;}
    .input-wrapper{position:relative;}
    .input-wrapper i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1.1rem;}
    input{width:100%;padding:14px 16px 14px 48px;background:var(--card2);border:2px solid var(--border);border-radius:14px;font-size:1rem;color:var(--text);outline:none;}
    input:focus{border-color:var(--primary);background:var(--card);box-shadow:0 0 0 4px var(--primary-l);}
    .btn-login{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:14px;font-size:1rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;box-shadow:0 4px 6px -1px var(--shadow);}
    .btn-login:hover{background:var(--primary-d);transform:translateY(-1px);box-shadow:0 10px 15px -3px var(--shadow);}
    .btn-login:active{transform:translateY(0);}
    .btn-login:disabled{opacity:0.7;cursor:not-allowed;}
    .theme-toggle{position:fixed;top:20px;right:20px;width:44px;height:44px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 4px 6px var(--shadow2);}
    .footer-text{text-align:center;margin-top:24px;font-size:0.85rem;color:var(--muted);}
    .skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--bg2) 50%,var(--border) 75%);background-size:200% 100%;animation:loading 1.5s infinite;}
    @keyframes loading{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  </style>
</head>
<body>

  <button class="theme-toggle" onclick="toggleTheme()" title="เปลี่ยนโหมดสี">
    <i class="fa-solid fa-moon"></i>
  </button>

  <div class="login-card">
    <div class="header">
      <div class="logo-area"><i class="fa-solid fa-city"></i></div>
      <h1>ยินดีต้อนรับ</h1>
      <p class="subtitle">ระบบบริหารจัดการหมู่บ้าน (VMS)</p>
    </div>

    <div class="input-group">
      <label>ชื่อผู้ใช้งาน</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="username" placeholder="Username" autocomplete="username" />
      </div>
    </div>

    <div class="input-group">
      <label>รหัสผ่าน</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <i class="fa-solid fa-right-to-bracket" id="loginIcon"></i>
      <span id="loginText">เข้าสู่ระบบ</span>
    </button>

    <div class="footer-text">
      &copy; 2024 Village Management System
    </div>
  </div>

  <script>
    // ตรวจสอบ Theme เดิมจาก LocalStorage
    if(localStorage.getItem('vms_theme')==='dark'){
      document.documentElement.setAttribute('data-theme','dark');
      document.querySelector('.theme-toggle i').className='fa-solid fa-sun';
    }

    function toggleTheme(){
      const current=document.documentElement.getAttribute('data-theme');
      const next=current==='dark'?'light':'dark';
      document.documentElement.setAttribute('data-theme',next);
      localStorage.setItem('vms_theme',next);
      document.querySelector('.theme-toggle i').className=next==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';
    }

    function setLoading(on){
      const btn = document.getElementById('loginBtn');
      const icon = document.getElementById('loginIcon');
      const text = document.getElementById('loginText');
      
      icon.style.display = on ? 'none' : 'inline';
      text.textContent = on ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ';
      btn.disabled = on;
    }

    async function doLogin(){
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if(!username || !password){
        Swal.fire({
          icon: 'warning',
          title: 'แจ้งเตือน',
          text: 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน',
          confirmButtonColor: '#4f7ef7'
        });
        return;
      }

      setLoading(true);

      try {
        // ใช้ apiCall จาก config.js แทนการ fetch แบบเดิม
        const data = await apiCall({
          action: 'login',
          username: username,
          password: password
        });

        if(data && data.success){
          // เก็บข้อมูลลง LocalStorage (Token ของเราตอนนี้เป็นแบบ Signed ป้องกันการแก้ Role)
          localStorage.setItem('vms_token', data.token);
          localStorage.setItem('vms_role', data.role);
          localStorage.setItem('vms_name', data.full_name);
          localStorage.setItem('vms_house', data.house_id);

          await Swal.fire({
            icon: 'success',
            title: 'ยินดีต้อนรับ',
            text: 'สวัสดีคุณ ' + data.full_name,
            timer: 1500,
            showConfirmButton: false
          });

          // แยกหน้าตามตำแหน่ง (Role)
          window.location.href = data.role === 'admin' ? 'admin.html' : 'dashboard.html';
        } else if (data) {
          Swal.fire({
            icon: 'error',
            title: 'เข้าสู่ระบบไม่สำเร็จ',
            text: data.message || 'ข้อมูลไม่ถูกต้อง',
            confirmButtonColor: '#4f7ef7'
          });
        }
      } catch(e) {
        console.error(e);
        Swal.fire({
          icon: 'error',
          title: 'เกิดข้อผิดพลาด',
          text: 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้',
          confirmButtonColor: '#4f7ef7'
        });
      } finally {
        setLoading(false);
      }
    }

    // รองรับการกด Enter เพื่อ Login
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        doLogin();
      }
    });
  </script>
</body>
</html>
