<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เข้าสู่ระบบ — ระบบบริหารหมู่บ้าน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --primary:   #5b8dee;
      --primary-d: #3a6fd8;
      --accent:    #7ec8a4;
      --bg:        #eef3fb;
      --card:      #ffffff;
      --text:      #2d3748;
      --muted:     #718096;
      --border:    #d6e4f7;
      --grad1:     #dbeafe;
      --grad2:     #d1fae5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: linear-gradient(135deg, var(--grad1) 0%, var(--grad2) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
    }
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #fff;
      margin-bottom: .75rem;
      box-shadow: 0 8px 24px rgba(91,141,238,.3);
    }
    .brand h1 { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    .brand p  { font-size: .9rem; color: var(--muted); margin-top: .2rem; }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 4px 32px rgba(91,141,238,.12);
      border: 1px solid var(--border);
    }
    .card h2 { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 1.5rem; }

    .form-group { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: .4rem;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: .9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: .95rem;
    }
    input {
      width: 100%;
      padding: .7rem .9rem .7rem 2.4rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Sarabun', sans-serif;
      font-size: .95rem;
      color: var(--text);
      background: #f8fbff;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(91,141,238,.15);
      background: #fff;
    }
    .toggle-pass {
      position: absolute;
      right: .9rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--muted);
      font-size: .9rem;
      background: none;
      border: none;
      padding: 0;
    }

    .btn-login {
      width: 100%;
      padding: .8rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-d));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Sarabun', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 16px rgba(91,141,238,.35);
    }
    .btn-login:hover   { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(91,141,238,.4); }
    .btn-login:active  { transform: translateY(0); }
    .btn-login i { margin-right: .4rem; }

    .public-links {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }
    .public-links p { font-size: .8rem; color: var(--muted); text-align: center; margin-bottom: .75rem; }
    .pub-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
    }
    .pub-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      padding: .6rem .5rem;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: #f8fbff;
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      font-size: .82rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, border-color .15s;
    }
    .pub-btn:hover { background: var(--grad1); border-color: var(--primary); color: var(--primary); }
    .pub-btn i { font-size: .85rem; }

    .loading { display: none; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; margin-right: .4rem; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon"><i class="fa-solid fa-house-chimney"></i></div>
    <h1>ระบบบริหารหมู่บ้าน</h1>
    <p>Village Management System</p>
  </div>

  <div class="card">
    <h2><i class="fa-solid fa-right-to-bracket" style="color:var(--primary);margin-right:.4rem"></i>เข้าสู่ระบบ</h2>

    <div class="form-group">
      <label for="username"><i class="fa-solid fa-user" style="margin-right:.3rem;color:var(--primary)"></i>ชื่อผู้ใช้</label>
      <div class="input-wrap">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" autocomplete="username"/>
      </div>
    </div>

    <div class="form-group">
      <label for="password"><i class="fa-solid fa-lock" style="margin-right:.3rem;color:var(--primary)"></i>รหัสผ่าน</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password"/>
        <button class="toggle-pass" type="button" onclick="togglePass()" id="eyeBtn">
          <i class="fa-solid fa-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" onclick="doLogin()">
      <span class="loading"><span class="spinner"></span></span>
      <span class="label-text"><i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ</span>
    </button>

    <div class="public-links">
      <p>หรือดูข้อมูลสาธารณะ</p>
      <div class="pub-grid">
        <a href="summary.html" class="pub-btn"><i class="fa-solid fa-chart-pie"></i> สรุปค่าส่วนกลาง</a>
        <a href="announcements.html" class="pub-btn"><i class="fa-solid fa-bullhorn"></i> ประกาศ</a>
        <a href="niti-report.html" class="pub-btn"><i class="fa-solid fa-clipboard-list"></i> ผลงานนิติ</a>
        <a href="admin.html" class="pub-btn" style="border-color:#f0a05a;color:#c07030;"><i class="fa-solid fa-shield-halved"></i> Admin</a>
      </div>
    </div>
  </div>
</div>

<script>
  // ======================================================
  // ⚙️  แก้ไข URL ตรงนี้หลัง Deploy GAS
  // ======================================================
  const API_URL = 'https://script.google.com/macros/s/AKfycbwQbc31pY86tM7EdD41dBsXRQ-OmL6M5m0TJKs_ZJiix2bLEYkHOiQ8eIGazR7ay0_l/exec';

  function togglePass() {
    const inp = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
    else { inp.type = 'password'; icon.className = 'fa-solid fa-eye'; }
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!username || !password) {
      Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน', confirmButtonColor: '#5b8dee' });
      return;
    }
    setLoading(true);
    try {
      const qs = new URLSearchParams({ action: 'login', username, password }).toString();
      const res = await fetch(API_URL + '?' + qs);
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('vms_token', data.token);
        localStorage.setItem('vms_role', data.role);
        localStorage.setItem('vms_name', data.full_name);
        localStorage.setItem('vms_house', data.house_id);
        await Swal.fire({ icon: 'success', title: 'ยินดีต้อนรับ', text: 'สวัสดี ' + data.full_name, timer: 1500, showConfirmButton: false });
        if (data.role === 'admin') window.location.href = 'admin.html';
        else window.location.href = 'dashboard.html';
      } else {
        Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบไม่สำเร็จ', text: data.message, confirmButtonColor: '#5b8dee' });
      }
    } catch(e) {
      Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', confirmButtonColor: '#5b8dee' });
    }
    setLoading(false);
  }

  function setLoading(on) {
    document.querySelector('.loading').style.display = on ? 'inline' : 'none';
    document.querySelector('.label-text').style.display = on ? 'none' : 'inline';
    document.querySelector('.btn-login').disabled = on;
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
