<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏘️</text></svg>"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ผลงานนิติ — ระบบบริหารหมู่บ้าน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.5/sweetalert2.all.min.js"></script>
  <style>
    :root{--primary:#4f7ef7;--primary-d:#2f5be8;--primary-l:#e8efff;--accent:#34c88a;--bg:#f0f4fd;--bg2:#e4ecfb;--card:#fff;--card2:#f8faff;--text:#1a2035;--text2:#4a5568;--muted:#8896ab;--border:#d0ddf5;--shadow:rgba(79,126,247,.15);--shadow2:rgba(0,0,0,.06);--income-bg:#d1fae5;--income-c:#059669;--expense-bg:#fee2e2;--expense-c:#dc2626;}
    [data-theme="dark"]{--primary:#6b9aff;--primary-d:#4f7ef7;--primary-l:#1a2540;--accent:#3dd68c;--bg:#0f1420;--bg2:#151c2e;--card:#1a2235;--card2:#202840;--text:#e8eeff;--text2:#a0aec0;--muted:#5a6a85;--border:#2a3650;--shadow:rgba(107,154,255,.12);--shadow2:rgba(0,0,0,.3);--income-bg:#0d2a1e;--income-c:#34d399;--expense-bg:#2a1010;--expense-c:#f87171;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
    nav{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px var(--shadow);position:sticky;top:0;z-index:100;}
    .nav-brand{display:flex;align-items:center;gap:.6rem;font-size:1rem;font-weight:700;}
    .nav-right{display:flex;align-items:center;gap:.5rem;}
    .btn-nav{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;padding:.35rem .8rem;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:.8rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;transition:background .15s;}
    .btn-nav:hover{background:rgba(255,255,255,.28);}
    .btn-theme{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;transition:background .15s;}
    .btn-theme:hover{background:rgba(255,255,255,.28);}
    .page-tabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;gap:0;overflow-x:auto;transition:background .3s;}
    .page-tab{white-space:nowrap;padding:.7rem 1rem;font-size:.82rem;font-weight:600;text-decoration:none;color:var(--muted);border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:.35rem;transition:all .15s;}
    .page-tab:hover{color:var(--primary);}
    .page-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
    main{max-width:900px;margin:0 auto;padding:1.5rem 1rem;}
    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.25rem;animation:fadeSlideIn .4s ease both;}
    .toolbar h2{font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:.5rem;}
    .toolbar h2 i{color:var(--primary);}
    .year-select{display:flex;gap:.4rem;flex-wrap:wrap;}
    .year-btn{padding:.35rem .85rem;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-family:'Sarabun',sans-serif;font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;}
    .year-btn.active,.year-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
    .report-card{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 12px var(--shadow2);margin-bottom:.85rem;transition:box-shadow .2s,transform .2s,background .3s,border-color .3s;animation:fadeSlideIn .4s ease both;}
    .report-card:hover{box-shadow:0 6px 24px var(--shadow);transform:translateY(-2px);}
    .report-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;background:var(--card2);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
    .report-header:hover{background:var(--bg2);}
    .report-month-badge{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;}
    .report-month-badge span{font-size:1.15rem;line-height:1;}
    .report-title-wrap{flex:1;margin:0 .85rem;}
    .report-title{font-size:.97rem;font-weight:700;}
    .report-sub{font-size:.78rem;color:var(--muted);margin-top:.15rem;}
    .report-fin{display:flex;gap:.4rem;flex-wrap:wrap;flex-shrink:0;}
    .fin-tag{font-size:.76rem;padding:.2rem .65rem;border-radius:20px;font-weight:700;display:flex;align-items:center;gap:.25rem;}
    .fin-tag.income{background:var(--income-bg);color:var(--income-c);}
    .fin-tag.expense{background:var(--expense-bg);color:var(--expense-c);}
    .toggle-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:.85rem;padding:.3rem .55rem;border-radius:8px;margin-left:.5rem;transition:all .15s;flex-shrink:0;}
    .toggle-btn:hover{background:var(--primary-l);color:var(--primary);border-color:var(--primary);}
    .report-body{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .2s;}
    .report-body.open{max-height:1200px;padding:1.1rem 1.2rem;}
    .report-content{font-size:.9rem;line-height:1.85;white-space:pre-line;color:var(--text2);}
    .fin-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-top:.9rem;}
    .fin-card{border-radius:12px;padding:.8rem 1rem;border:1.5px solid;display:flex;align-items:center;gap:.65rem;transition:background .3s;}
    .fin-card.income{background:var(--income-bg);border-color:#6ee7b7;}
    .fin-card.expense{background:var(--expense-bg);border-color:#fca5a5;}
    .fin-card.balance{background:#ede9fe;border-color:#c4b5fd;}
    [data-theme="dark"] .fin-card.balance{background:#1e1530;border-color:#6d28d9;}
    .fin-card i{font-size:1.25rem;}
    .fin-card.income i{color:var(--income-c);}
    .fin-card.expense i{color:var(--expense-c);}
    .fin-card.balance i{color:#7c3aed;}
    [data-theme="dark"] .fin-card.balance i{color:#a78bfa;}
    .fin-label{font-size:.74rem;color:var(--muted);}
    .fin-amt{font-size:.95rem;font-weight:800;}
    .empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
    .empty i{font-size:2.5rem;display:block;margin-bottom:.75rem;opacity:.4;}
    .skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--card2) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;}
    @keyframes shimmer{to{background-position:-200% 0;}}
    .photo-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.6rem;margin-top:.9rem;}
    .photo-thumb{aspect-ratio:1;border-radius:10px;overflow:hidden;border:2px solid var(--border);cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;background:var(--bg2);}
    .photo-thumb:hover{transform:scale(1.04);border-color:var(--primary);box-shadow:0 4px 12px var(--shadow);}
    .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;align-items:center;justify-content:center;flex-direction:column;}
    .lightbox.open{display:flex;}
    .lightbox img{max-width:92vw;max-height:80vh;border-radius:12px;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,.5);}
    .lightbox-close{position:absolute;top:1rem;right:1.2rem;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.5rem;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
    .lightbox-close:hover{background:rgba(255,255,255,.25);}
    .lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.2rem;width:46px;height:46px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
    .lightbox-nav:hover{background:rgba(255,255,255,.25);}
    .lightbox-nav.prev{left:1rem;}
    .lightbox-nav.next{right:1rem;}
    .lightbox-counter{color:rgba(255,255,255,.7);font-size:.85rem;margin-top:.6rem;}
    @media(max-width:600px){
      .report-fin{display:none;}
      .fin-grid{grid-template-columns:1fr;}
      .photo-gallery{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));}
      .report-header{padding:.85rem 1rem;gap:.6rem;}
      .report-month-badge{width:42px;height:42px;font-size:.6rem;}
      .report-month-badge span{font-size:1rem;}
      .report-title{font-size:.88rem;}
      .report-body.open{padding:.9rem 1rem;}
      .toolbar{flex-direction:column;align-items:flex-start;}
      main{padding:1rem .75rem;}
      .lightbox-nav.prev{left:.4rem;}
      .lightbox-nav.next{right:.4rem;}
      .lightbox-nav{width:38px;height:38px;font-size:1rem;}
    }
    @media(max-width:400px){
      .report-title-wrap{margin:0 .4rem;}
      .fin-card{padding:.65rem .75rem;}
    }
    .niti-file-btn{display:inline-flex;align-items:center;gap:.45rem;padding:.4rem 1rem;border-radius:20px;border:1.5px solid var(--border);background:var(--card2);font-family:'Sarabun',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s;}
    .niti-file-btn.file-btn-pdf{color:#dc2626;border-color:#fca5a5;background:#fff5f5;}
    .niti-file-btn.file-btn-pdf:hover{background:#dc2626;color:#fff;border-color:#dc2626;}
    .niti-file-btn.file-btn-img{color:var(--primary);border-color:var(--primary);}
    .niti-file-btn.file-btn-img:hover{background:var(--primary);color:#fff;}
    [data-theme="dark"] .niti-file-btn.file-btn-pdf{background:#2a1010;}
    .niti-file-viewer{margin-top:.6rem;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--bg2);display:none;}
    .niti-file-viewer.open{display:block;}
  </style>
</head>
<body>
<nav>
  <div class="nav-brand"><i class="fa-solid fa-clipboard-list"></i> ผลงานนิติบุคคล</div>
  <div class="nav-right">
    <button class="btn-theme" onclick="toggleTheme()"><i id="themeIcon" class="fa-solid fa-moon"></i></button>
    <a href="index.html" class="btn-nav" id="homeLink"><i class="fa-solid fa-house"></i> หน้าหลัก</a>
  </div>
</nav>
<div class="page-tabs">
  <a href="dashboard.html" class="page-tab" id="dashLink"><i class="fa-solid fa-house"></i> ข้อมูลของฉัน</a>
  <a href="summary.html" class="page-tab"><i class="fa-solid fa-chart-pie"></i> สรุปค่าส่วนกลาง</a>
  <a href="announcements.html" class="page-tab"><i class="fa-solid fa-bullhorn"></i> ประกาศ</a>
  <a href="niti-report.html" class="page-tab active"><i class="fa-solid fa-clipboard-list"></i> ผลงานนิติ</a>
</div>
<main>
  <div class="toolbar">
    <h2><i class="fa-solid fa-clipboard-check"></i> ผลงานประจำเดือน</h2>
    <div class="year-select" id="yearBtns"><span style="font-size:.82rem;color:var(--muted)">กำลังโหลด...</span></div>
  </div>
  <div id="reportList">
    <div class="report-card"><div class="report-header"><div class="skeleton" style="width:50px;height:50px;border-radius:14px;flex-shrink:0"></div><div style="flex:1;margin:0 .85rem"><div class="skeleton" style="height:18px;width:50%;margin-bottom:.4rem"></div><div class="skeleton" style="height:12px;width:35%"></div></div></div></div>
    <div class="report-card"><div class="report-header"><div class="skeleton" style="width:50px;height:50px;border-radius:14px;flex-shrink:0"></div><div style="flex:1;margin:0 .85rem"><div class="skeleton" style="height:18px;width:60%;margin-bottom:.4rem"></div><div class="skeleton" style="height:12px;width:40%"></div></div></div></div>
  </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightboxBg(event)">
  <button class="lightbox-close" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></button>
  <button class="lightbox-nav prev" onclick="navPhoto(-1);event.stopPropagation()"><i class="fa-solid fa-chevron-left"></i></button>
  <img id="lightboxImg" src="" alt=""/>
  <div class="lightbox-counter" id="lightboxCounter"></div>
  <button class="lightbox-nav next" onclick="navPhoto(1);event.stopPropagation()"><i class="fa-solid fa-chevron-right"></i></button>
</div>

<script>
  const API_URL='https://script.google.com/macros/s/AKfycbwQbc31pY86tM7EdD41dBsXRQ-OmL6M5m0TJKs_ZJiix2bLEYkHOiQ8eIGazR7ay0_l/exec';
  const token=localStorage.getItem('vms_token');
  const role=localStorage.getItem('vms_role');

  applyTheme(localStorage.getItem('vms_theme')||'light');
  function applyTheme(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('themeIcon').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';localStorage.setItem('vms_theme',t);}
  function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}

  if(!token)document.getElementById('dashLink').style.display='none';
  if(role==='admin'){document.getElementById('homeLink').href='admin.html';document.getElementById('homeLink').innerHTML='<i class="fa-solid fa-shield-halved"></i> Admin';}

  const MONTHS_TH=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const MONTHS_FULL=['','มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

  // ✅ BUG FIX: ประกาศตัวแปรครั้งเดียวเท่านั้น
  let allReports=[];
  let currentYear='';
  let lightboxPhotos=[];
  let lightboxIdx=0;

  function extractFileId(url){const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);return m?m[1]:null;}
  function driveThumb(fid){return'https://drive.google.com/thumbnail?id='+fid+'&sz=w400';}
  function drivePreview(fid){return'https://drive.google.com/uc?id='+fid;}

  function buildFileAttachment(fileUrl,idx){
    if(!fileUrl)return'';
    const fid=extractFileId(fileUrl);
    const isPdf=fileUrl.toLowerCase().includes('.pdf')||(fid&&!fileUrl.match(/\.(jpg|jpeg|png|gif|webp)/i));
    const fileIcon=isPdf?'fa-file-pdf':'fa-image';
    const fileLabel=isPdf?'ดูเอกสารแนบ PDF':'ดูรูปภาพแนบ';
    const btnCls=isPdf?'file-btn-pdf':'file-btn-img';
    const previewUrl=isPdf
      ?(fid?`https://drive.google.com/file/d/${fid}/preview`:fileUrl)
      :(fid?`https://drive.google.com/thumbnail?id=${fid}&sz=w1200`:fileUrl);
    const viewerHtml=isPdf
      ?`<iframe src="${previewUrl}" style="width:100%;height:480px;border:none;display:block"></iframe>`
      :`<img src="${previewUrl}" style="width:100%;max-height:520px;object-fit:contain;display:block;border-radius:8px" onerror="this.src='${fileUrl}'">`;
    return`<div style="margin-top:.9rem">
      <div style="font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:.4rem"><i class="fa-solid fa-paperclip"></i> ไฟล์แนบ</div>
      <button class="niti-file-btn ${btnCls}" onclick="toggleNitiFile(this,'nitiFile${idx}','${viewerHtml.replace(/'/g,'&#39;')}')">
        <i class="fa-solid ${fileIcon}"></i> ${fileLabel}
      </button>
      <div class="niti-file-viewer" id="nitiFile${idx}"></div>
    </div>`;
  }

  function toggleNitiFile(btn,viewerId,html){
    const wrap=document.getElementById(viewerId);
    if(wrap.classList.contains('open')){wrap.classList.remove('open');wrap.innerHTML='';return;}
    wrap.classList.add('open');wrap.innerHTML=html;
  }

  function renderPhotoGallery(photoUrlsStr){
    if(!photoUrlsStr)return'';
    const urls=photoUrlsStr.split(',').map(u=>u.trim()).filter(Boolean);
    if(!urls.length)return'';
    const thumbs=urls.map((url,pi)=>{
      const fid=extractFileId(url);
      const src=fid?driveThumb(fid):url;
      return`<div class="photo-thumb" onclick='openLightbox(${JSON.stringify(urls)},${pi})'><img src="${src}" alt="รูป ${pi+1}" loading="lazy" onerror="this.style.display='none'"></div>`;
    }).join('');
    return`<div style="margin-top:.75rem;font-size:.8rem;font-weight:700;color:var(--muted)"><i class="fa-solid fa-images"></i> รูปภาพ (${urls.length})</div><div class="photo-gallery">${thumbs}</div>`;
  }

  function openLightbox(urls,idx){lightboxPhotos=urls;lightboxIdx=idx;showLightboxPhoto();document.getElementById('lightbox').classList.add('open');}
  function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
  function closeLightboxBg(e){if(e.target===document.getElementById('lightbox'))closeLightbox();}
  function navPhoto(dir){lightboxIdx=(lightboxIdx+dir+lightboxPhotos.length)%lightboxPhotos.length;showLightboxPhoto();}
  function showLightboxPhoto(){
    const url=lightboxPhotos[lightboxIdx];
    const fid=extractFileId(url);
    document.getElementById('lightboxImg').src=fid?drivePreview(fid):url;
    document.getElementById('lightboxCounter').textContent=(lightboxIdx+1)+' / '+lightboxPhotos.length;
  }
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')navPhoto(-1);if(e.key==='ArrowRight')navPhoto(1);});

  async function loadReports(){
    const r=await fetch(API_URL+'?'+new URLSearchParams({action:'getNitiReports'}));
    const d=await r.json();
    if(d.success){
      allReports=d.data;
      const years=[...new Set(allReports.map(r=>String(r.year)).filter(Boolean))].sort((a,b)=>b-a);
      currentYear=years[0]||'';
      document.getElementById('yearBtns').innerHTML=years.length
        ?years.map(y=>`<button class="year-btn ${y===currentYear?'active':''}" onclick="filterYear(this,'${y}')">${y}</button>`).join('')
        :'<span style="font-size:.82rem;color:var(--muted)">ไม่มีข้อมูล</span>';
      renderReports();
    }
  }

  function filterYear(btn,year){
    document.querySelectorAll('.year-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');currentYear=year;renderReports();
  }

  function renderReports(){
    const filtered=allReports.filter(r=>String(r.year)===currentYear);
    if(!filtered.length){document.getElementById('reportList').innerHTML=`<div class="empty"><i class="fa-solid fa-clipboard-list"></i>ยังไม่มีรายงานในปีนี้</div>`;return;}
    document.getElementById('reportList').innerHTML=filtered.map((r,i)=>{
      const income=parseFloat(String(r.income||0).replace(/,/g,''))||0;
      const expense=parseFloat(String(r.expense||0).replace(/,/g,''))||0;
      const balance=income-expense;
      const balColor=balance>=0?'#7c3aed':'#dc2626';
      const m=Number(r.month);
      return`<div class="report-card" style="animation-delay:${i*0.05}s">
        <div class="report-header" onclick="toggleReport(this)">
          <div class="report-month-badge"><span>${m}</span>${MONTHS_TH[m]}</div>
          <div class="report-title-wrap">
            <div class="report-title">${r.title}</div>
            <div class="report-sub"><i class="fa-solid fa-calendar" style="margin-right:.2rem"></i>${MONTHS_FULL[m]} ${r.year}</div>
          </div>
          <div class="report-fin">
            ${income?`<span class="fin-tag income"><i class="fa-solid fa-arrow-up"></i>${income.toLocaleString()}</span>`:''}
            ${expense?`<span class="fin-tag expense"><i class="fa-solid fa-arrow-down"></i>${expense.toLocaleString()}</span>`:''}
          </div>
          <button class="toggle-btn"><i class="fa-solid fa-chevron-down" style="transition:transform .25s"></i></button>
        </div>
        <div class="report-body">
          <div class="report-content">${r.content}</div>
          ${(income||expense)?`<div class="fin-grid">
            <div class="fin-card income"><i class="fa-solid fa-arrow-circle-up"></i><div><div class="fin-label">รายรับ</div><div class="fin-amt">${income.toLocaleString()} ฿</div></div></div>
            <div class="fin-card expense"><i class="fa-solid fa-arrow-circle-down"></i><div><div class="fin-label">รายจ่าย</div><div class="fin-amt">${expense.toLocaleString()} ฿</div></div></div>
            <div class="fin-card balance"><i class="fa-solid fa-scale-balanced"></i><div><div class="fin-label">คงเหลือ</div><div class="fin-amt" style="color:${balColor}">${balance.toLocaleString()} ฿</div></div></div>
          </div>`:''}
          ${renderPhotoGallery(r.photo_urls)}
          ${buildFileAttachment(r.file_url||r.report_file_url||'',i)}
          ${r.created_date?`<p style="font-size:.74rem;color:var(--muted);margin-top:.75rem"><i class="fa-solid fa-clock"></i> บันทึกเมื่อ ${r.created_date} โดย ${r.created_by}</p>`:''}
        </div>
      </div>`;
    }).join('');
  }

  function toggleReport(el){
    const body=el.nextElementSibling;
    const icon=el.querySelector('.fa-chevron-down');
    body.classList.toggle('open');
    icon.style.transform=body.classList.contains('open')?'rotate(180deg)':'';
  }

  loadReports();
</script>
</body>
</html>
