<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ผลงานนิติ — ระบบบริหารหมู่บ้าน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="config.js"></script>
  <style>
    :root{--primary:#4f7ef7;--primary-d:#2f5be8;--primary-l:#e8efff;--accent:#34c88a;--bg:#f0f4fd;--bg2:#e4ecfb;--card:#fff;--card2:#f8faff;--text:#1a2035;--text2:#4a5568;--muted:#8896ab;--border:#d0ddf5;--shadow:rgba(79,126,247,.15);--shadow2:rgba(0,0,0,.06);--income-bg:#d1fae5;--income-c:#059669;--expense-bg:#fee2e2;--expense-c:#dc2626;}
    [data-theme="dark"]{--bg:#0f172a;--bg2:#1e293b;--card:#1e293b;--card2:#334155;--text:#f8fafc;--text2:#cbd5e1;--muted:#94a3b8;--border:#334155;--shadow:rgba(0,0,0,.3);--primary-l:rgba(79,126,247,.1);}
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Sarabun',sans-serif;}
    body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;}
    .nav{background:var(--card);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 6px -1px var(--shadow2);border-bottom:1px solid var(--border);}
    .nav-brand{display:flex;align-items:center;gap:12px;font-weight:700;font-size:1.25rem;color:var(--primary);}
    .container{max-width:800px;margin:20px auto;padding:0 16px;}
    .page-header{margin-bottom:24px;}
    .page-header h1{font-size:1.5rem;font-weight:700;margin-bottom:4px;}
    .page-header p{color:var(--muted);font-size:0.9rem;}
    
    .report-card{background:var(--card);border-radius:20px;border:1px solid var(--border);margin-bottom:16px;overflow:hidden;box-shadow:0 4px 6px var(--shadow2);transition:transform 0.2s;}
    .report-card:hover{transform:translateY(-2px);}
    .report-header{padding:20px;display:flex;align-items:flex-start;gap:16px;cursor:pointer;}
    .report-icon{width:48px;height:48px;background:var(--primary-l);color:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
    .report-title-area{flex:1;}
    .report-title{font-weight:700;font-size:1.1rem;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
    .report-date{font-size:0.8rem;color:var(--muted);display:flex;align-items:center;gap:6px;}
    .toggle-btn{background:none;border:none;color:var(--muted);padding:8px;cursor:pointer;}
    
    .report-body{padding:0 20px 20px 84px;display:none;border-top:1px dashed var(--border);padding-top:20px;}
    .report-content{font-size:0.95rem;line-height:1.6;color:var(--text2);margin-bottom:20px;white-space:pre-wrap;}
    
    .fin-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:12px;margin-bottom:20px;}
    .fin-card{padding:12px;border-radius:14px;display:flex;align-items:center;gap:12px;}
    .fin-card i{font-size:1.5rem;}
    .fin-label{font-size:0.75rem;font-weight:600;opacity:0.8;}
    .fin-amt{font-weight:700;font-size:1rem;}
    .income{background:var(--income-bg);color:var(--income-c);}
    .expense{background:var(--expense-bg);color:var(--expense-c);}
    .balance{background:var(--card2);border:1px solid var(--border);}
    
    .photo-gallery{display:grid;grid-template-columns:repeat(auto-fill, minmax(100px, 1fr));gap:10px;margin-top:16px;}
    .photo-item{aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid var(--border);}
    .photo-item img{width:100%;height:100%;object-fit:cover;transition:0.3s;}
    .photo-item:hover img{transform:scale(1.1);}

    .menu-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;justify-content:space-around;padding:12px;border-top:1px solid var(--border);box-shadow:0 -4px 10px var(--shadow2);z-index:100;}
    .menu-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);text-decoration:none;font-size:0.75rem;font-weight:500;flex:1;}
    .menu-item.active{color:var(--primary);}
    .menu-item i{font-size:1.25rem;}

    .skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--bg2) 50%,var(--border) 75%);background-size:200% 100%;animation:loading 1.5s infinite;height:100px;border-radius:20px;margin-bottom:16px;}
    @keyframes loading{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
    @media (max-width:600px){ .report-body{padding-left:20px;} .report-icon{display:none;} }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-brand"><i class="fa-solid fa-city"></i> VMS</div>
    <div style="font-size:0.8rem;font-weight:600" id="userNameDisp">...</div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1><i class="fa-solid fa-chart-line" style="color:var(--accent)"></i> ผลงานนิติบุคคล</h1>
      <p>รายงานกิจกรรม รายรับ-รายจ่าย และการปรับปรุงหมู่บ้าน</p>
    </div>

    <div id="reportList">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>

  <div class="menu-bar">
    <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-house"></i><span>หน้าหลัก</span></a>
    <a href="announcements.html" class="menu-item"><i class="fa-solid fa-bullhorn"></i><span>ประกาศ</span></a>
    <a href="niti-report.html" class="menu-item active"><i class="fa-solid fa-chart-line"></i><span>ผลงานนิติ</span></a>
    <a href="summary.html" class="menu-item"><i class="fa-solid fa-file-contract"></i><span>สรุปยอด</span></a>
    <a href="#" class="menu-item" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>ออก</span></a>
  </div>

  <script>
    if(localStorage.getItem('vms_theme')==='dark') document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('userNameDisp').textContent = localStorage.getItem('vms_name') || 'สมาชิก';

    document.addEventListener('DOMContentLoaded', loadReports);

    async function loadReports() {
      try {
        // ใช้ apiCall แทน fetch แบบเดิม
        const res = await apiCall({ action: 'getNitiReports' });
        
        if (res && res.success) {
          renderReports(res.data);
        } else {
          document.getElementById('reportList').innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">ไม่พบข้อมูลรายงานในขณะนี้</div>`;
        }
      } catch (e) {
        console.error(e);
        document.getElementById('reportList').innerHTML = `<div style="text-align:center;padding:40px;color:red">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>`;
      }
    }

    function renderReports(data) {
      const container = document.getElementById('reportList');
      if (!data || data.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">ไม่มีรายงาน</div>';
        return;
      }

      container.innerHTML = data.map((r, i) => {
        const income = parseFloat(r.income) || 0;
        const expense = parseFloat(r.expense) || 0;
        const balance = income - expense;
        const balColor = balance >= 0 ? 'var(--income-c)' : 'var(--expense-c)';
        const photoHtml = buildPhotoGallery(r.photo_urls);

        return `
          <div class="report-card">
            <div class="report-header" onclick="toggleReport(this)">
              <div class="report-icon"><i class="fa-solid fa-file-lines"></i></div>
              <div class="report-title-area">
                <div class="report-title">${r.title}</div>
                <div class="report-date">
                  <span><i class="fa-solid fa-calendar"></i> ${getMonthName(r.month)} ${r.year}</span>
                  ${r.created_date ? `<span><i class="fa-solid fa-clock"></i> ${r.created_date}</span>` : ''}
                </div>
              </div>
              <button class="toggle-btn"><i class="fa-solid fa-chevron-down" style="transition:0.3s"></i></button>
            </div>
            <div class="report-body">
              <div class="report-content">${r.content}</div>
              
              ${(income > 0 || expense > 0) ? `
              <div class="fin-grid">
                <div class="fin-card income">
                  <i class="fa-solid fa-circle-arrow-up"></i>
                  <div><div class="fin-label">รายรับ</div><div class="fin-amt">${income.toLocaleString()} ฿</div></div>
                </div>
                <div class="fin-card expense">
                  <i class="fa-solid fa-circle-arrow-down"></i>
                  <div><div class="fin-label">รายจ่าย</div><div class="fin-amt">${expense.toLocaleString()} ฿</div></div>
                </div>
                <div class="fin-card balance">
                  <i class="fa-solid fa-scale-balanced"></i>
                  <div><div class="fin-label">คงเหลือ</div><div class="fin-amt" style="color:${balColor}">${balance.toLocaleString()} ฿</div></div>
                </div>
              </div>` : ''}

              ${photoHtml}
              
              ${r.created_by ? `<p style="font-size:0.75rem;color:var(--muted);margin-top:15px;text-align:right">ผู้รายงาน: ${r.created_by}</p>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function buildPhotoGallery(urls) {
      if (!urls) return '';
      const list = urls.split(',').filter(u => u.trim() !== '');
      if (list.length === 0) return '';
      
      return `
        <div style="font-weight:600;font-size:0.85rem;margin-bottom:8px">รูปภาพประกอบ:</div>
        <div class="photo-gallery">
          ${list.map(url => `
            <div class="photo-item" onclick="viewPhoto('${url.trim()}')">
              <img src="${url.trim()}" alt="Report Photo" loading="lazy">
            </div>
          `).join('')}
        </div>
      `;
    }

    function viewPhoto(url) {
      Swal.fire({
        imageUrl: url,
        imageAlt: 'Report Photo',
        showConfirmButton: false,
        showCloseButton: true,
        width: 'auto'
      });
    }

    function toggleReport(el) {
      const body = el.nextElementSibling;
      const icon = el.querySelector('.fa-chevron-down');
      const isVisible = body.style.display === 'block';
      body.style.display = isVisible ? 'none' : 'block';
      icon.style.transform = isVisible ? 'rotate(0deg)' : 'rotate(-180deg)';
    }

    function getMonthName(m) {
      const months = ["","มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
      return months[parseInt(m)] || m;
    }

    function logout() {
      Swal.fire({
        title: 'ออกจากระบบ?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'ตกลง',
        cancelButtonText: 'ยกเลิก'
      }).then((result) => {
        if (result.isConfirmed) {
          localStorage.clear();
          window.location.href = 'index.html';
        }
      });
    }
  </script>
</body>
</html>
