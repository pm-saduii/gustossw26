<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ประกาศ — ระบบบริหารหมู่บ้าน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --primary: #5b8dee; --primary-d: #3a6fd8;
      --accent: #7ec8a4; --bg: #eef3fb; --card: #fff;
      --text: #2d3748; --muted: #718096; --border: #d6e4f7;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      background: linear-gradient(135deg, var(--primary), var(--primary-d));
      color: #fff; padding: .85rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(91,141,238,.3);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { display: flex; align-items: center; gap: .6rem; font-size: 1.05rem; font-weight: 700; }
    .btn-nav {
      background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.35);
      color: #fff; padding: .35rem .8rem; border-radius: 8px;
      font-family: 'Sarabun', sans-serif; font-size: .82rem;
      cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: .3rem;
    }
    .btn-nav:hover { background: rgba(255,255,255,.3); }

    .page-links {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: .5rem 1.5rem; display: flex; gap: .5rem; overflow-x: auto;
    }
    .page-link {
      white-space: nowrap; padding: .4rem .9rem; border-radius: 20px;
      font-size: .82rem; font-weight: 500; text-decoration: none;
      color: var(--muted); border: 1.5px solid transparent; transition: all .15s;
    }
    .page-link:hover, .page-link.active { background: var(--bg); border-color: var(--border); color: var(--primary); }

    main { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem; }

    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: .75rem; margin-bottom: 1.5rem;
    }
    .toolbar h2 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: .5rem; }
    .toolbar h2 i { color: var(--primary); }

    .filter-btns { display: flex; gap: .4rem; flex-wrap: wrap; }
    .filter-btn {
      padding: .35rem .85rem; border-radius: 20px; border: 1.5px solid var(--border);
      background: #fff; font-family: 'Sarabun', sans-serif; font-size: .82rem;
      color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .filter-btn.active, .filter-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Ann card */
    .ann-list { display: flex; flex-direction: column; gap: 1rem; }
    .ann-card {
      background: var(--card); border-radius: 14px; border: 1px solid var(--border);
      overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.04);
      transition: box-shadow .15s;
    }
    .ann-card:hover { box-shadow: 0 4px 18px rgba(91,141,238,.12); }
    .ann-top {
      padding: 1rem 1.25rem;
      display: flex; align-items: flex-start; gap: .85rem;
    }
    .ann-icon {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 1.15rem;
    }
    .ann-icon.ทั่วไป   { background: #dbeafe; color: var(--primary); }
    .ann-icon.ด่วน     { background: #fee2e2; color: #dc2626; }
    .ann-icon.สำคัญ   { background: #fef3c7; color: #d97706; }

    .ann-title { font-size: 1rem; font-weight: 700; margin-bottom: .25rem; }
    .ann-meta  { font-size: .78rem; color: var(--muted); display: flex; gap: .75rem; flex-wrap: wrap; }
    .ann-meta i { margin-right: .2rem; }
    .ann-toggle {
      margin-left: auto; flex-shrink: 0;
      background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem;
      padding: .2rem;
    }
    .ann-body {
      padding: 0 1.25rem;
      max-height: 0; overflow: hidden; transition: max-height .3s ease, padding .2s;
    }
    .ann-body.open { max-height: 600px; padding: 0 1.25rem 1rem; }
    .ann-body p { font-size: .9rem; line-height: 1.7; white-space: pre-line; }

    .cat-badge {
      font-size: .72rem; padding: .15rem .55rem; border-radius: 12px; font-weight: 600; margin-left: .3rem;
    }
    .cat-badge.ทั่วไป { background: #dbeafe; color: var(--primary); }
    .cat-badge.ด่วน   { background: #fee2e2; color: #dc2626; }
    .cat-badge.สำคัญ  { background: #fef3c7; color: #d97706; }

    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty i { font-size: 2.5rem; margin-bottom: .75rem; opacity: .4; display: block; }

    .skeleton { background: linear-gradient(90deg, #e2ecf8 25%, #f0f6ff 50%, #e2ecf8 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px; }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand"><i class="fa-solid fa-bullhorn"></i> ประกาศหมู่บ้าน</div>
  <a href="index.html" class="btn-nav" id="homeLink"><i class="fa-solid fa-house"></i> หน้าหลัก</a>
</nav>

<div class="page-links">
  <a href="dashboard.html" class="page-link" id="dashLink"><i class="fa-solid fa-house"></i> ข้อมูลของฉัน</a>
  <a href="summary.html" class="page-link"><i class="fa-solid fa-chart-pie"></i> สรุปค่าส่วนกลาง</a>
  <a href="announcements.html" class="page-link active"><i class="fa-solid fa-bullhorn"></i> ประกาศ</a>
  <a href="niti-report.html" class="page-link"><i class="fa-solid fa-clipboard-list"></i> ผลงานนิติ</a>
</div>

<main>
  <div class="toolbar">
    <h2><i class="fa-solid fa-bullhorn"></i> ประกาศทั้งหมด</h2>
    <div class="filter-btns">
      <button class="filter-btn active" onclick="filterCat(this,'')">ทั้งหมด</button>
      <button class="filter-btn" onclick="filterCat(this,'ด่วน')"><i class="fa-solid fa-circle-exclamation"></i> ด่วน</button>
      <button class="filter-btn" onclick="filterCat(this,'สำคัญ')"><i class="fa-solid fa-star"></i> สำคัญ</button>
      <button class="filter-btn" onclick="filterCat(this,'ทั่วไป')"><i class="fa-solid fa-info-circle"></i> ทั่วไป</button>
    </div>
  </div>

  <div class="ann-list" id="annList">
    <div class="ann-card"><div class="ann-top"><div class="skeleton" style="width:44px;height:44px;border-radius:12px;flex-shrink:0"></div><div style="flex:1"><div class="skeleton" style="height:18px;width:60%;margin-bottom:.5rem"></div><div class="skeleton" style="height:12px;width:40%"></div></div></div></div>
    <div class="ann-card"><div class="ann-top"><div class="skeleton" style="width:44px;height:44px;border-radius:12px;flex-shrink:0"></div><div style="flex:1"><div class="skeleton" style="height:18px;width:50%;margin-bottom:.5rem"></div><div class="skeleton" style="height:12px;width:35%"></div></div></div></div>
    <div class="ann-card"><div class="ann-top"><div class="skeleton" style="width:44px;height:44px;border-radius:12px;flex-shrink:0"></div><div style="flex:1"><div class="skeleton" style="height:18px;width:70%;margin-bottom:.5rem"></div><div class="skeleton" style="height:12px;width:45%"></div></div></div></div>
  </div>
</main>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwQbc31pY86tM7EdD41dBsXRQ-OmL6M5m0TJKs_ZJiix2bLEYkHOiQ8eIGazR7ay0_l/exec';
  const token = localStorage.getItem('vms_token');
  const role  = localStorage.getItem('vms_role');

  if (!token) document.getElementById('dashLink').style.display = 'none';
  if (role === 'admin') {
    document.getElementById('homeLink').href = 'admin.html';
    document.getElementById('homeLink').innerHTML = '<i class="fa-solid fa-shield-halved"></i> Admin';
  }

  let allAnn = [];
  let currentCat = '';

  const catIcon = { 'ทั่วไป': 'fa-info-circle', 'ด่วน': 'fa-circle-exclamation', 'สำคัญ': 'fa-star' };

  async function loadAnnouncements() {
    const qs = new URLSearchParams({ action: 'getAnnouncements' }).toString();
    const r = await fetch(API_URL + '?' + qs);
    const d = await r.json();
    if (d.success) {
      allAnn = d.data;
      renderList();
    }
  }

  function filterCat(btn, cat) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = cat;
    renderList();
  }

  function renderList() {
    const filtered = currentCat ? allAnn.filter(a => a.category === currentCat) : allAnn;
    if (!filtered.length) {
      document.getElementById('annList').innerHTML = `<div class="empty"><i class="fa-solid fa-bullhorn"></i>ยังไม่มีประกาศ</div>`;
      return;
    }
    document.getElementById('annList').innerHTML = filtered.map((a, i) => {
      const cat = a.category || 'ทั่วไป';
      return `
      <div class="ann-card">
        <div class="ann-top">
          <div class="ann-icon ${cat}"><i class="fa-solid ${catIcon[cat] || 'fa-info-circle'}"></i></div>
          <div style="flex:1">
            <div class="ann-title">${a.title} <span class="cat-badge ${cat}">${cat}</span></div>
            <div class="ann-meta">
              <span><i class="fa-solid fa-calendar"></i>${a.date}</span>
              <span><i class="fa-solid fa-user"></i>${a.created_by}</span>
            </div>
          </div>
          <button class="ann-toggle" onclick="toggleAnn(this)" title="ขยาย/ย่อ">
            <i class="fa-solid fa-chevron-down"></i>
          </button>
        </div>
        <div class="ann-body" id="annBody${i}">
          <p>${a.content}</p>
        </div>
      </div>`;
    }).join('');
  }

  function toggleAnn(btn) {
    const body = btn.closest('.ann-card').querySelector('.ann-body');
    const icon = btn.querySelector('i');
    body.classList.toggle('open');
    icon.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
  }

  loadAnnouncements();
</script>
</body>
</html>
