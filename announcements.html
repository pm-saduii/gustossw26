<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏘️</text></svg>"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ประกาศ — ระบบบริหารหมู่บ้าน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.5/sweetalert2.all.min.js"></script>
  <style>
    :root{--primary:#4f7ef7;--primary-d:#2f5be8;--primary-l:#e8efff;--accent:#34c88a;--bg:#f0f4fd;--bg2:#e4ecfb;--card:#fff;--card2:#f8faff;--text:#1a2035;--text2:#4a5568;--muted:#8896ab;--border:#d0ddf5;--shadow:rgba(79,126,247,.15);--shadow2:rgba(0,0,0,.06);}
    [data-theme="dark"]{--primary:#6b9aff;--primary-d:#4f7ef7;--primary-l:#1a2540;--accent:#3dd68c;--bg:#0f1420;--bg2:#151c2e;--card:#1a2235;--card2:#202840;--text:#e8eeff;--text2:#a0aec0;--muted:#5a6a85;--border:#2a3650;--shadow:rgba(107,154,255,.12);--shadow2:rgba(0,0,0,.3);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
    nav{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px var(--shadow);position:sticky;top:0;z-index:100;}
    .nav-brand{display:flex;align-items:center;gap:.6rem;font-size:1rem;font-weight:700;}
    .nav-right{display:flex;align-items:center;gap:.5rem;}
    .btn-nav{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;padding:.35rem .8rem;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:.8rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;transition:background .15s;}
    .btn-nav:hover{background:rgba(255,255,255,.28);}
    .btn-theme{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;transition:background .15s;}
    .btn-theme:hover{background:rgba(255,255,255,.28);}
        /* ── PAGE TABS: desktop horizontal bar ── */
    .page-tabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;gap:0;transition:background .3s,border-color .3s;position:sticky;top:54px;z-index:100;}
    .page-tab{white-space:nowrap;padding:.72rem 1.1rem;font-size:.84rem;font-weight:600;text-decoration:none;color:var(--muted);border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:.4rem;transition:color .15s,border-color .15s;flex-shrink:0;}
    .page-tab i{font-size:.82rem;}
    .page-tab:hover{color:var(--primary);}
    .page-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
    .btn-nav-text{}
    /* ── PAGE TABS: mobile bottom navigation bar ── */
    @media(max-width:600px){
      body{padding-bottom:68px;}
      .page-tabs{position:fixed;bottom:0;left:0;right:0;top:auto;padding:0;border-bottom:none;border-top:1px solid var(--border);background:var(--card);box-shadow:0 -4px 20px rgba(0,0,0,.08);display:grid;grid-template-columns:repeat(4,1fr);gap:0;z-index:300;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
      .page-tab{flex-direction:column;align-items:center;justify-content:center;padding:.6rem .3rem .55rem;gap:.18rem;border-bottom:none;border-top:3px solid transparent;color:var(--muted);transition:color .15s,border-color .15s,background .15s;}
      .page-tab i{font-size:1.05rem;}
      .page-tab span{font-size:.67rem;font-weight:600;line-height:1;}
      .page-tab:hover{background:var(--bg2);color:var(--primary);}
      .page-tab.active{color:var(--primary);border-top-color:var(--primary);background:var(--primary-l);}
      .btn-nav-text{display:none;}
    }
    main{max-width:860px;margin:0 auto;padding:1.5rem 1rem;}
    .toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.25rem;animation:fadeSlideIn .4s ease both;}
    .toolbar h2{font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:.5rem;}
    .toolbar h2 i{color:var(--primary);}
    .filter-btns{display:flex;gap:.4rem;flex-wrap:wrap;}
    .filter-btn{padding:.35rem .85rem;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-family:'Sarabun',sans-serif;font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;}
    .filter-btn.active,.filter-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-l);}
    .filter-btn.ด่วน.active,.filter-btn.ด่วน:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626;}
    .filter-btn.สำคัญ.active,.filter-btn.สำคัญ:hover{background:#fef3c7;border-color:#fcd34d;color:#d97706;}
    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .ann-list{display:flex;flex-direction:column;gap:.85rem;}
    .ann-card{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 12px var(--shadow2);transition:box-shadow .2s,transform .2s,background .3s,border-color .3s;animation:fadeSlideIn .4s ease both;}
    .ann-card:hover{box-shadow:0 6px 24px var(--shadow);transform:translateY(-2px);}
    .ann-top{padding:1rem 1.2rem;display:flex;align-items:flex-start;gap:.85rem;}
    .ann-icon{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
    .ann-icon.ทั่วไป{background:var(--primary-l);color:var(--primary);}
    .ann-icon.ด่วน{background:#fee2e2;color:#dc2626;}
    .ann-icon.สำคัญ{background:#fef3c7;color:#d97706;}
    [data-theme="dark"] .ann-icon.ด่วน{background:#2a1010;color:#f87171;}
    [data-theme="dark"] .ann-icon.สำคัญ{background:#2a2010;color:#fbbf24;}
    .ann-title{font-size:.97rem;font-weight:700;margin-bottom:.25rem;}
    .ann-meta{font-size:.77rem;color:var(--muted);display:flex;gap:.75rem;flex-wrap:wrap;}
    .ann-meta i{margin-right:.2rem;}
    .ann-toggle{margin-left:auto;flex-shrink:0;background:var(--bg2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:.85rem;padding:.3rem .55rem;border-radius:8px;transition:all .15s;}
    .ann-toggle:hover{background:var(--primary-l);color:var(--primary);border-color:var(--primary);}
    .ann-body{padding:0 1.2rem;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .2s;}
    .ann-body.open{max-height:700px;padding:0 1.2rem 1rem;}
    .ann-body p{font-size:.9rem;line-height:1.8;white-space:pre-line;color:var(--text2);}
    .cat-badge{font-size:.7rem;padding:.12rem .5rem;border-radius:10px;font-weight:700;margin-left:.3rem;}
    .cat-badge.ทั่วไป{background:var(--primary-l);color:var(--primary);}
    .cat-badge.ด่วน{background:#fee2e2;color:#dc2626;}
    .cat-badge.สำคัญ{background:#fef3c7;color:#d97706;}
    [data-theme="dark"] .cat-badge.ด่วน{background:#2a1010;color:#f87171;}
    [data-theme="dark"] .cat-badge.สำคัญ{background:#2a2010;color:#fbbf24;}
    .empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
    .empty i{font-size:2.5rem;margin-bottom:.75rem;opacity:.4;display:block;}
    .skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--card2) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;}
    @keyframes shimmer{to{background-position:-200% 0;}}
    .ann-file-btn{display:inline-flex;align-items:center;gap:.4rem;margin:.5rem 0 0;padding:.35rem .85rem;border-radius:20px;border:1.5px solid var(--border);background:var(--card2);font-size:.8rem;font-weight:700;color:var(--primary);cursor:pointer;transition:all .15s;text-decoration:none;}
    .ann-file-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
    .ann-file-btn.pdf{color:#dc2626;border-color:#fca5a5;background:#fff5f5;}
    .ann-file-btn.pdf:hover{background:#dc2626;color:#fff;border-color:#dc2626;}
    [data-theme="dark"] .ann-file-btn.pdf{background:#2a1010;}
    .file-viewer-wrap{margin-top:.75rem;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--bg2);display:none;}
    .file-viewer-wrap.open{display:block;}
    .file-viewer-wrap iframe{width:100%;height:480px;border:none;display:block;}
    .file-viewer-wrap img{width:100%;max-height:480px;object-fit:contain;display:block;}
  </style>
</head>
<body>

<nav>
  <div class="nav-brand"><i class="fa-solid fa-bullhorn"></i> ประกาศหมู่บ้าน</div>
  <div class="nav-right">
    <button class="btn-theme" onclick="toggleTheme()"><i id="themeIcon" class="fa-solid fa-moon"></i></button>
    <a href="index.html" class="btn-nav" id="homeLink"><i class="fa-solid fa-house"></i> <span class="btn-nav-text">หน้าหลัก</span></a>
  </div>
</nav>

<div class="page-tabs">
  <a href="dashboard.html" class="page-tab" id="dashLink"><i class="fa-solid fa-house"></i><span>ข้อมูลของฉัน</span></a>
  <a href="summary.html" class="page-tab"><i class="fa-solid fa-chart-pie"></i><span>สรุปค่าส่วนกลาง</span></a>
  <a href="announcements.html" class="page-tab active"><i class="fa-solid fa-bullhorn"></i><span>ประกาศ</span></a>
  <a href="niti-report.html" class="page-tab"><i class="fa-solid fa-clipboard-list"></i><span>ผลงานนิติ</span></a>
</div>

<main>
  <div class="toolbar">
    <h2><i class="fa-solid fa-bullhorn"></i> ประกาศทั้งหมด</h2>
    <div class="filter-btns">
      <button class="filter-btn active" onclick="filterCat(this,'')">ทั้งหมด</button>
      <button class="filter-btn ด่วน" onclick="filterCat(this,'ด่วน')"><i class="fa-solid fa-circle-exclamation"></i> ด่วน</button>
      <button class="filter-btn สำคัญ" onclick="filterCat(this,'สำคัญ')"><i class="fa-solid fa-star"></i> สำคัญ</button>
      <button class="filter-btn" onclick="filterCat(this,'ทั่วไป')"><i class="fa-solid fa-info-circle"></i> ทั่วไป</button>
    </div>
  </div>

  <div class="ann-list" id="annList">
    <div class="ann-card"><div class="ann-top"><div class="skeleton" style="width:44px;height:44px;border-radius:12px;flex-shrink:0"></div><div style="flex:1"><div class="skeleton" style="height:18px;width:60%;margin-bottom:.5rem"></div><div class="skeleton" style="height:12px;width:40%"></div></div></div></div>
    <div class="ann-card"><div class="ann-top"><div class="skeleton" style="width:44px;height:44px;border-radius:12px;flex-shrink:0"></div><div style="flex:1"><div class="skeleton" style="height:18px;width:50%;margin-bottom:.5rem"></div><div class="skeleton" style="height:12px;width:35%"></div></div></div></div>
  </div>
</main>

<script>
  const API_URL='https://script.google.com/macros/s/AKfycbwQbc31pY86tM7EdD41dBsXRQ-OmL6M5m0TJKs_ZJiix2bLEYkHOiQ8eIGazR7ay0_l/exec';
  const token=localStorage.getItem('vms_token');
  const role=localStorage.getItem('vms_role');

  // Theme
  applyTheme(localStorage.getItem('vms_theme')||'light');
  function applyTheme(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('themeIcon').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';localStorage.setItem('vms_theme',t);}
  function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}

  if(!token)document.getElementById('dashLink').style.display='none';
  if(role==='admin'){document.getElementById('homeLink').href='admin.html';document.getElementById('homeLink').innerHTML='<i class="fa-solid fa-shield-halved"></i> Admin';}

  let allAnn=[];
  let currentCat='';
  const catIcon={'ทั่วไป':'fa-info-circle','ด่วน':'fa-circle-exclamation','สำคัญ':'fa-star'};

  async function loadAnnouncements(){
    const r=await fetch(API_URL+'?'+new URLSearchParams({action:'getAnnouncements'}));
    const d=await r.json();
    if(d.success){allAnn=d.data;renderList();}
  }

  function filterCat(btn,cat){
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');currentCat=cat;renderList();
  }

  function fmtDate(val){
    if(!val)return'—';
    const s=String(val).trim();
    if(/^\d{4}-\d{2}-\d{2}/.test(s)){
      const d=new Date(s);
      const dd=String(d.getDate()).padStart(2,'0');
      const mm=String(d.getMonth()+1).padStart(2,'0');
      return`${dd}/${mm}/${d.getFullYear()+543}`;
    }
    const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(m){const yr=parseInt(m[3]);return`${m[1].padStart(2,'0')}/${m[2].padStart(2,'0')}/${yr<2500?yr+543:yr}`;}
    return s;
  }

  function extractFileId(url){const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);return m?m[1]:null;}

  function renderList(){
    const filtered=currentCat?allAnn.filter(a=>a.category===currentCat):allAnn;
    if(!filtered.length){
      document.getElementById('annList').innerHTML=`<div class="empty"><i class="fa-solid fa-bullhorn"></i>ยังไม่มีประกาศ</div>`;return;
    }
    document.getElementById('annList').innerHTML=filtered.map((a,i)=>{
      const cat=a.category||'ทั่วไป';
      const fileUrl=a.file_url||'';
      let fileHtml='';
      if(fileUrl){
        const fid=extractFileId(fileUrl);
        const isPdf=fileUrl.toLowerCase().includes('.pdf')||(fid&&!fileUrl.includes('image'));
        const fileIcon=isPdf?'fa-file-pdf':'fa-image';
        const fileLabel=isPdf?'ดูเอกสาร PDF':'ดูรูปภาพแนบ';
        const btnCls=isPdf?'pdf':'';
        const viewerContent=isPdf
          ?`<iframe src="${fid?`https://drive.google.com/file/d/${fid}/preview`:fileUrl}" allowfullscreen style="width:100%;height:480px;border:none;display:block"></iframe>`
          :`<img src="${fid?`https://drive.google.com/thumbnail?id=${fid}&sz=w1200`:fileUrl}" style="width:100%;max-height:520px;object-fit:contain;display:block" onerror="this.src='${fileUrl}'">`;
        fileHtml=`
          <button class="ann-file-btn ${btnCls}" onclick="toggleFile(this,'viewer${i}','${viewerContent.replace(/'/g,'&#39;')}')">
            <i class="fa-solid ${fileIcon}"></i> ${fileLabel}
          </button>
          <div class="file-viewer-wrap" id="viewer${i}"></div>`;
      }
      return`<div class="ann-card" style="animation-delay:${i*0.05}s">
        <div class="ann-top">
          <div class="ann-icon ${cat}"><i class="fa-solid ${catIcon[cat]||'fa-info-circle'}"></i></div>
          <div style="flex:1">
            <div class="ann-title">${a.title} <span class="cat-badge ${cat}">${cat}</span></div>
            <div class="ann-meta"><span><i class="fa-solid fa-calendar"></i>${fmtDate(a.date)}</span><span><i class="fa-solid fa-user"></i>${a.created_by||''}</span></div>
          </div>
          <button class="ann-toggle" onclick="toggleAnn(this)"><i class="fa-solid fa-chevron-down"></i></button>
        </div>
        <div class="ann-body" id="annBody${i}"><p>${a.content}</p>${fileHtml}</div>
      </div>`;
    }).join('');
  }

  function toggleFile(btn,viewerId,html){
    const wrap=document.getElementById(viewerId);
    if(wrap.classList.contains('open')){wrap.classList.remove('open');wrap.innerHTML='';btn.innerHTML=btn.innerHTML.replace('ซ่อน','ดู').replace('fa-chevron-up','fa-chevron-down');return;}
    wrap.classList.add('open');
    wrap.innerHTML=html;
  }

  function toggleAnn(btn){
    const body=btn.closest('.ann-card').querySelector('.ann-body');
    const icon=btn.querySelector('i');
    body.classList.toggle('open');
    icon.style.transform=body.classList.contains('open')?'rotate(180deg)':'';
  }

  loadAnnouncements();
</script>
</body>
</html>
